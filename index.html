      // 🔥 REGISTRO CON OWNER AUTOMÁTICO
window._registerUser = async (email, password, displayName) => {
  try {
    const cred = await window._fbCreateUser(window._fbAuth, email, password);
    const user = cred.user;

    // 🔍 Verificar si ya hay usuarios
    const snap = await window._fbGet(
     window._fbRef(window._fbDb, "users")
    );
    const accounts = snap.exists() ? snap.val() : null;

    const isFirstUser = !accounts || Object.keys(accounts).length === 0;

    // 🧠 Definir rol
    const role = isFirstUser ? "owner" : "dm";
    const status = isFirstUser ? "approved" : "pending";

    // 💾 Guardar usuario con rol
    await window._fbSet(
      window._fbRef(window._fbDb, `users/${user.uid}`),
      {
        uid: user.uid,
        email: user.email,
        displayName: displayName || "",
        role,
        status,
        requestedAt: Date.now(),
        approvedAt: isFirstUser ? Date.now() : null,
      }
    );

    return user;
  } catch (err) {
    console.error("Error en registro:", err);
    throw err;
  }
};

const { useState, useEffect, useRef, useCallback } = React;

// ─── FIREBASE HELPERS ────────────────────────────────────────
const fb = {
  ref: (path) => window._fbRef(window._fbDb, path),
  set: (path, val) => window._fbSet(window._fbRef(window._fbDb, path), val),
  get: async (path) => {
    const snap = await window._fbGet(window._fbRef(window._fbDb, path));
    return snap.exists() ? snap.val() : null;
  },
  update: (path, val) => window._fbUpdate(window._fbRef(window._fbDb, path), val),
  listen: (path, cb) => window._fbOnValue(window._fbRef(window._fbDb, path), snap => cb(snap.exists() ? snap.val() : null)),
  push: (path, val) => window._fbPush(window._fbRef(window._fbDb, path), val),
};
const authApi = {
  current: () => window._fbAuth?.currentUser || null,
  listen: (cb) => window._fbOnAuthStateChanged(window._fbAuth, cb),
  signIn: (email, password) => window._fbSignIn(window._fbAuth, email, password),

  register: async (email, password, displayName) => {
    const cred = await window._fbCreateUser(window._fbAuth, email, password);
    const user = cred.user;

    const snap = await window._fbGet(
      window._fbRef(window._fbDb, "accounts")
    );
    const accounts = snap.exists() ? snap.val() : null;

    const isFirstUser = !accounts || Object.keys(accounts).length === 0;

    const role = isFirstUser ? "owner" : "dm";
    const status = isFirstUser ? "approved" : "pending";

    await window._fbSet(
      window._fbRef(window._fbDb, `users/${user.uid}`),
      {
        uid: user.uid,
        email: user.email,
        displayName: displayName || "",
        role,
        status,
        requestedAt: Date.now(),
        approvedAt: isFirstUser ? Date.now() : null,
      }
    );

    return user;
  },

  signOut: () => window._fbSignOut(window._fbAuth),
  updateProfile: (user, data) => window._fbUpdateProfile(user, data),
};

const buildStarterLoadout=(cls)=>{
  const equipment={},owned=[],seen=new Set();
  const add=(id)=>{if(!ITEMS[id]||seen.has(id))return;seen.add(id);owned.push(id);};
  (CLASS_ITEMS[cls]||[]).forEach(id=>{const it=ITEMS[id];if(!it)return;if(!equipment[it.slot])equipment[it.slot]=id;add(id);});
  [...(STYLE_LOADOUTS.all||[]),...(STYLE_LOADOUTS[cls]||[])].forEach(add);
  return{equipment,inventory:owned};
};

const checkItem=(char,item)=>{
  const issues=[];
  if(item.minStr&&char.stats.str<item.minStr)issues.push(`Requiere FUE ${item.minStr}`);
  if(item.minInt&&char.stats.int<item.minInt)issues.push(`Requiere INT ${item.minInt}`);
  if(item.minLevel&&char.level<item.minLevel)issues.push(`Requiere nivel ${item.minLevel}`);
  if(item.classOnly&&!item.classOnly.includes(char.class))issues.push(`Solo para: ${item.classOnly.map(c=>CLASSES[c]?.n).join(", ")}`);
  return{ok:issues.length===0,issues};
};

const calcAC=(char)=>{
  const eq=char.equipment||{},dexMod=mod(char.stats.dex);
  let ac=10+dexMod;
  const body=ITEMS[eq.body];
  if(body)ac=body.ac+(body.acDex?Math.min(dexMod,body.maxDex!==undefined?body.maxDex:99):0);
  const off=ITEMS[eq.offhand];if(off?.t==="armor")ac+=off.ac||0;
  const cape=ITEMS[eq.cape];if(cape?.ac)ac+=cape.ac;
  const acc=ITEMS[eq.acc];if(acc?.ac)ac+=acc.ac;
  const head=ITEMS[eq.head];if(head?.ac)ac+=head.ac;
  if(char.class==="barbarian"&&!body)ac=10+dexMod+mod(char.stats.con);
  if(char.class==="monk"&&!body&&!eq.offhand)ac=10+dexMod+mod(char.stats.wis);
  return ac;
};

const calcBonuses=(char)=>{
  const eq=char.equipment||{},bonuses={};
  Object.values(eq).forEach(eid=>{const it=ITEMS[eid];if(it?.bonus)Object.entries(it.bonus).forEach(([k,v])=>{bonuses[k]=(bonuses[k]||0)+v;});});
  return bonuses;
};

      {weaponItem?.magical && hasWeapon && <circle cx="79" cy="50" r="4" fill="rgba(201,168,76,0.4)" style={{animation:"glow 2s infinite"}}/>}

      {/* Neck */}
      <rect x="44" y="50" width="12" height="13" rx="4" fill={skin}/>

      {/* Head */}
      <ellipse cx="50" cy={isFemale?36:38} rx={isFemale?16:15} ry={isFemale?18:17} fill={skin}/>

      {/* Helm */}
      {hasHelm && eq.head==="helm" && <path d="M34,38 Q34,20 50,20 Q66,20 66,38 L62,38 Q62,24 50,24 Q38,24 38,38Z" fill="#7A8890"/>}
      {hasHelm && eq.head==="wizardhat" && <>
        <path d="M50,5 L58,30 L42,30Z" fill="#3A2A70"/>
        <rect x="36" y="28" width="28" height="5" rx="2" fill="#5A4A90"/>
      </>}
      {hasHelm && eq.head==="crownvalor" && <>
        <path d="M34,30 L36,20 L40,28 L50,18 L60,28 L64,20 L66,30Z" fill="#C9A84C"/>
      </>}
      {hasHelm && eq.head==="adventurerhood" && <path d="M34,38 Q34,20 50,20 Q66,20 66,30 L62,32 Q60,22 50,22 Q38,22 38,35Z" fill="#4A3020" opacity="0.85"/>}
      {hasHelm && eq.head==="hairribbon" && <path d="M40,28 Q50,22 60,28 Q55,24 50,26 Q45,24 40,28Z" fill="#C83040"/>}

      {/* Hair */}
      {!hasHelm && isFemale && <path d="M34,36 Q34,14 50,14 Q66,14 66,36 Q60,20 50,20 Q40,20 34,36Z" fill="#4A3020"/>}
      {!hasHelm && isFemale && <path d="M34,36 Q28,50 30,65" stroke="#4A3020" strokeWidth="6" strokeLinecap="round" fill="none"/>}
      {!hasHelm && isFemale && <path d="M66,36 Q72,50 70,65" stroke="#4A3020" strokeWidth="6" strokeLinecap="round" fill="none"/>}
      {!hasHelm && !isFemale && <path d="M35,38 Q35,18 50,18 Q65,18 65,38 Q60,22 50,22 Q40,22 35,38Z" fill="#3A2818"/>}

      {/* Face */}
      <ellipse cx="44" cy={isFemale?37:39} rx="2.5" ry="2" fill="rgba(0,0,0,0.45)"/>
      <ellipse cx="56" cy={isFemale?37:39} rx="2.5" ry="2" fill="rgba(0,0,0,0.45)"/>
      <path d={`M45,${isFemale?44:46} Q50,${isFemale?47:49} 55,${isFemale?44:46}`} stroke="rgba(0,0,0,0.3)" strokeWidth="1.2" fill="none" strokeLinecap="round"/>

      {/* Magical glow on armor */}
      {bodyItem?.magical && <rect x={isFemale?32:34} y="60" width={isFemale?36:32} height="48" rx="6" fill="rgba(90,90,200,0.08)" stroke="rgba(100,100,220,0.3)" strokeWidth="0.5"/>}

      {/* Shadow */}
      <ellipse cx="50" cy="148" rx="22" ry="5" fill="rgba(0,0,0,0.4)"/>
    </svg>
  );
};

// ─── EQUIPMENT SLOTS LAYOUT (Lineage 2 style) ────────────────
const SLOT_LAYOUT = [
  { id:"head",    label:"Cabeza",    icon:"⛑️",  pos:{top:0, left:"50%", transform:"translateX(-50%)"} },
  { id:"mainhand",label:"Arma",      icon:"⚔️",  pos:{top:60, left:4} },
  { id:"body",    label:"Cuerpo",    icon:"🛡️",  pos:{top:60, left:"50%", transform:"translateX(-50%)"} },
  { id:"offhand", label:"Escudo",    icon:"🛡",   pos:{top:60, right:4} },
  { id:"cape",    label:"Capa",      icon:"🧥",  pos:{top:130, left:4} },
  { id:"acc",     label:"Accesorio", icon:"💍",  pos:{top:130, left:"50%", transform:"translateX(-50%)"} },
];

const rarBadgeColor = {c:"#888",u:"#5cb85c",r:"#5ba3e0"};

const EquipSlot = ({ slotId, char, onEquip }) => {
  const eq = char?.equipment || {};
  const itemId = eq[slotId];
  const item = ITEMS[itemId];
  const slotDef = SLOT_LAYOUT.find(s=>s.id===slotId);

  return (
    <div
      className={`l2-slot${item?" filled":""}`}
      style={slotDef?.pos ? {...slotDef.pos, position:"absolute"} : {}}
      onClick={() => item && onEquip(null, slotId)}
      title={item ? `${item.n} — click para desequipar` : slotDef?.label}
    >
      {item ? <>
        <span className="slot-icon">{item.e}</span>
        <span className="slot-name" style={{maxWidth:36,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.n.split(" ")[0]}</span>
        <span className="slot-rarity" style={{color:rarBadgeColor[item.rar]||"#888"}}>●</span>
      </> : <>
        <span style={{fontSize:14,opacity:.4}}>{slotDef?.icon}</span>
        <span className="slot-label">{slotDef?.label}</span>
      </>}
    </div>
  );
};

// ─── L2 CHARACTER MODAL CONTENT ──────────────────────────────
const L2CharacterPanel = ({ char, onEquip, onUpdateHP, onUpdateWallet }) => {
  const [activeTab, setActiveTab] = useState("equipment");
  const [hpDelta, setHpDelta] = useState("");
  const [showItemDetail, setShowItemDetail] = useState(null);
  const [showReq, setShowReq] = useState(null);

  if (!char) return <div style={{padding:24,color:"var(--muted)",textAlign:"center",fontStyle:"italic"}}>No hay personaje cargado.</div>;

  const wallet = normalizeWallet(char.wallet);
  const inv = char.inventory || [];
  const eq = char.equipment || {};
  const hpPct = (char.currentHP / char.maxHP) * 100;
  const hpColor = hpPct > 60 ? "#4CAF50" : hpPct > 25 ? "#FFC107" : "#E24B4A";
  const bonuses = calcBonuses(char);
  const ac = calcAC(char);
  const prof = profBonus(char.level);
  const equipableInventory = inv
    .map((itemId, idx) => ({ itemId, idx, item: ITEMS[itemId] }))
    .filter(({ item }) => item && canEquipItem(item));
  const nonEquipableCount = inv.filter(itemId => {
    const item = ITEMS[itemId];
    return item && !canEquipItem(item);
  }).length;

  const tryEquip = (itemId, slot) => {
    const item = ITEMS[itemId];
    if (!item || !canEquipItem(item)) return;
    const {ok, issues} = checkItem(char, item);
    if (!ok) { setShowReq({item,issues,slot,itemId}); return; }
    onEquip(itemId, slot);
  };

  const addCoin = (type, amount) => {
    const newWallet = {...wallet, [type]: Math.max(0, (wallet[type]||0) + amount)};
    onUpdateWallet(newWallet);
  };

  // All items for inventory grid — fill to multiple of 6
  const gridItems = [...inv];
  while (gridItems.length % 6 !== 0 || gridItems.length < 12) gridItems.push(null);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:0}}>
      {/* Character header */}
      <div style={{padding:"14px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:12}}>
        <div style={{flex:1}}>
          <div style={{fontFamily:"Cinzel,serif",fontSize:18,color:"var(--gold)"}}>{char.name}</div>
          <div style={{fontSize:12,color:"var(--muted)"}}>{RACES[char.race]?.n} {CLASSES[char.class]?.n} · Nivel {char.level}</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <div style={{textAlign:"center",background:"rgba(0,0,0,.3)",border:"1px solid var(--border)",borderRadius:3,padding:"4px 10px"}}>
            <div style={{fontSize:10,color:"var(--muted)",fontFamily:"Cinzel,serif"}}>HP</div>
            <div style={{fontFamily:"Cinzel,serif",fontSize:15,fontWeight:700,color:hpColor}}>{char.currentHP}/{char.maxHP}</div>
          </div>
          <div style={{textAlign:"center",background:"rgba(0,0,0,.3)",border:"1px solid var(--border)",borderRadius:3,padding:"4px 10px"}}>
            <div style={{fontSize:10,color:"var(--muted)",fontFamily:"Cinzel,serif"}}>CA</div>
            <div style={{fontFamily:"Cinzel,serif",fontSize:15,fontWeight:700,color:"var(--gold)"}}>{ac}</div>
          </div>
        </div>
      </div>

      {/* HP bar */}
      <div style={{height:4,background:"rgba(0,0,0,.3)"}}>
        <div style={{height:"100%",width:`${hpPct}%`,background:hpColor,transition:"width .4s"}}/>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"1px solid var(--border)"}}>
        {[["equipment","Equipo"],["inventory","Mochila"],["stats","Stats"],["wallet","Monedero"]].map(([id,label])=>(
          <button key={id} className={`tab${activeTab===id?" act":""}`} style={{flex:1,fontSize:10}} onClick={()=>setActiveTab(id)}>{label}</button>
        ))}
      </div>

      <div style={{padding:14,overflowY:"auto",maxHeight:"calc(90vh - 200px)"}}>
        {/* ── EQUIPMENT TAB ── */}
        {activeTab==="equipment" && (
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            {/* Portrait + slots */}
            <div style={{flex:"0 0 auto",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
              {/* Lineage 2 layout: slots around portrait */}
              <div style={{position:"relative",width:220,height:220}}>
                {/* Portrait center */}
                <div style={{position:"absolute",top:30,left:60,width:100,height:160}}>
                  <CharSVG char={char}/>
                </div>
                {/* HEAD slot — top center */}
                <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)"}}>
                  <EquipSlot slotId="head" char={char} onEquip={onEquip}/>
                </div>
                {/* MAINHAND — left */}
                <div style={{position:"absolute",top:65,left:0}}>
                  <EquipSlot slotId="mainhand" char={char} onEquip={onEquip}/>
                </div>
                {/* BODY — center below head */}
                <div style={{position:"absolute",top:65,left:"50%",transform:"translateX(-50%)"}}>
                  <EquipSlot slotId="body" char={char} onEquip={onEquip}/>
                </div>
                {/* OFFHAND — right */}
                <div style={{position:"absolute",top:65,right:0}}>
                  <EquipSlot slotId="offhand" char={char} onEquip={onEquip}/>
                </div>
                {/* CAPE — bottom left */}
                <div style={{position:"absolute",top:140,left:0}}>
                  <EquipSlot slotId="cape" char={char} onEquip={onEquip}/>
                </div>
                {/* ACC — bottom center */}
                <div style={{position:"absolute",top:140,left:"50%",transform:"translateX(-50%)"}}>
                  <EquipSlot slotId="acc" char={char} onEquip={onEquip}/>
                </div>
              </div>
              <div style={{fontSize:11,color:"var(--muted)",textAlign:"center",lineHeight:1.4}}>
                Click en slot equipado para desequipar.<br/>
                <span style={{color:"var(--gold)"}}>Mochila → click item para equipar.</span>
              </div>
            </div>

            {/* Item list for equipping */}
            <div style={{flex:1,minWidth:160}}>
              <div style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--muted)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:8}}>Inventario para equipar</div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {equipableInventory.map(({itemId,idx,item})=>{
                  const {ok}=checkItem(char,item);
                  const equipped=eq[item.slot]===itemId;
                  return(
                    <div key={`${itemId}-${idx}`} className="itm" style={{padding:"6px 10px"}} onClick={()=>tryEquip(itemId,item.slot)}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:16}}>{item.e}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,color:ok?"var(--text)":"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.n}</div>
                          <div style={{fontSize:10,color:"var(--muted)"}}>{getItemMetaLabel(item)} {item.dmg&&`· ${item.dmg}`}</div>
                        </div>
                        {equipped&&<span className="badge badge-l" style={{fontSize:8}}>EQ</span>}
                        <span style={{width:5,height:5,borderRadius:"50%",background:rarBadgeColor[item.rar],flexShrink:0,display:"inline-block"}}/>
                      </div>
                      {!ok&&<div style={{fontSize:10,color:"#E24B4A",marginTop:2}}>⚠ Sin requisitos</div>}
                    </div>
                  );
                })}
              </div>
              {nonEquipableCount>0&&<div style={{marginTop:8,fontSize:11,color:"var(--muted)"}}>Consumibles y objetos especiales quedan guardados en la mochila.</div>}
            </div>
          </div>
        )}

        {/* ── INVENTORY (GRID) TAB ── */}
        {activeTab==="inventory" && (
          <div>
            <div style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--muted)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:10}}>
              Mochila · {(char.inventory||[]).length} objetos
            </div>
            <div className="inv-grid">
              {gridItems.map((itemId,i)=>{
                if(!itemId) return <div key={i} className="inv-cell empty"><span style={{fontSize:10,color:"rgba(255,255,255,.1)"}}>·</span></div>;
                const item=ITEMS[itemId];
                if(!item)return<div key={i} className="inv-cell empty"/>;
                const equipped=Object.values(eq).includes(itemId);
                return(
                  <div key={i} className={`inv-cell${equipped?" equipped":""}`}
                    onClick={()=>setShowItemDetail(item)}
                    title={item.n}>
                    <span style={{fontSize:20}}>{item.e}</span>
                    <span className="cell-name">{item.n.split(" ")[0]}</span>
                    <span className={`cell-dot ${item.rar}`}/>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:8,fontSize:11,color:"var(--muted)"}}>Click en un item para ver detalles y equipar.</div>
          </div>
        )}

        {/* ── STATS TAB ── */}
        {activeTab==="stats" && (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {/* HP control */}
            <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:3,padding:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontFamily:"Cinzel,serif",fontSize:11,color:"var(--muted)"}}>Puntos de Golpe</span>
                <span style={{fontFamily:"Cinzel,serif",color:hpColor,fontWeight:700}}>{char.currentHP}/{char.maxHP}</span>
              </div>
              <div className="hp-bar"><div className="hp-fill" style={{width:`${hpPct}%`,background:hpColor}}/></div>
              <div style={{display:"flex",gap:6,marginTop:8}}>
                <input className="inp" style={{fontSize:13}} placeholder="±HP" value={hpDelta} onChange={e=>setHpDelta(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&hpDelta&&(onUpdateHP(char.currentHP+parseInt(hpDelta)||0),setHpDelta(""))}/>
                <button className="btn btn-sm btn-r" onClick={()=>hpDelta&&(onUpdateHP(char.currentHP+parseInt(hpDelta)||0),setHpDelta(""))}>OK</button>
              </div>
            </div>
            {/* Stat grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
              {STATS.map(s=>{
                const base=char.stats[s],bonus=bonuses[s]||0,total=base+bonus;
                return(
                  <div key={s} className="stat-b">
                    <div style={{fontSize:9,color:"var(--muted)",fontFamily:"Cinzel,serif"}}>{STAT_N[s]}</div>
                    <div style={{fontFamily:"Cinzel,serif",fontSize:18,fontWeight:700,color:bonus>0?"var(--gold)":"var(--text)"}}>{total}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>{modStr(total)}</div>
                  </div>
                );
              })}
            </div>
            {/* Key combat */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
              {[["CA",ac],["Prof",`+${prof}`],["Vel",`${RACES[char.race]?.spd}ft`]].map(([l,v])=>(
                <div key={l} className="stat-b">
                  <div style={{fontSize:9,color:"var(--muted)",fontFamily:"Cinzel,serif"}}>{l}</div>
                  <div style={{fontFamily:"Cinzel,serif",fontSize:16,fontWeight:700,color:"var(--gold)"}}>{v}</div>
                </div>
              ))}
            </div>
            {/* Saves */}
            <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:3,padding:10}}>
              <div style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--muted)",marginBottom:6,textTransform:"uppercase",letterSpacing:".08em"}}>Tiradas de Salvación</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2}}>
                {STATS.map(s=>{
                  const proficient=CLASSES[char.class]?.saves.includes(s);
                  const total=mod(char.stats[s])+(bonuses[s]||0)+(proficient?prof:0);
                  return(
                    <div key={s} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"2px 4px"}}>
                      <span style={{color:proficient?"var(--gold)":"var(--muted)"}}>{proficient?"◆":"◇"} {STAT_N[s]}</span>
                      <span style={{fontFamily:"Cinzel,serif"}}>{total>=0?"+":""}{total}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ── WALLET TAB ── */}
        {activeTab==="wallet" && (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--muted)",letterSpacing:".1em",textTransform:"uppercase"}}>Monedero del Aventurero</div>
            <div className="wallet">
              {COIN_TYPES.map(({type,icon,label,color})=>(
                <div key={type} className="coin-box" style={{borderColor:`${color}44`}}>
                  <div className="coin-icon">{icon}</div>
                  <div className="coin-amt" style={{color}}>{wallet[type]||0}</div>
                  <div className="coin-label">{label}</div>
                  <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:6}}>
                    <button className="btn btn-sm" style={{fontSize:10,padding:"3px 8px"}} onClick={()=>addCoin(type,-1)}>−1</button>
                    <button className="btn btn-sm btn-g" style={{fontSize:10,padding:"3px 8px"}} onClick={()=>addCoin(type,1)}>+1</button>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:3,padding:12}}>
              <div style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--muted)",marginBottom:8}}>Ajuste rápido</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {[["gold","+5 oro",5],["gold","+10 oro",10],["gold","-5 oro",-5],["silver","+10 plata",10],["copper","+20 cobre",20],["gold","+50 oro",50]].map(([type,label,amt],i)=>(
                  <button key={i} className="btn btn-sm" style={{fontSize:10}} onClick={()=>addCoin(type,amt)}>{label}</button>
                ))}
              </div>
            </div>
            <div style={{background:"rgba(201,168,76,.06)",border:"1px solid var(--gold-dim)",borderRadius:3,padding:10}}>
              <div style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--gold)",marginBottom:4}}>Conversión estándar</div>
              <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.6}}>1 po = 10 pp = 100 pc</div>
            </div>
          </div>
        )}
      </div>

      {/* Item detail modal */}
      {showItemDetail && (
        <div className="overlay" onClick={()=>setShowItemDetail(null)}>
          <div className="modal" style={{maxWidth:340}} onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
                <span style={{fontSize:36}}>{showItemDetail.e}</span>
                <div>
                  <div style={{fontFamily:"Cinzel,serif",fontSize:16,color:"var(--gold)"}}>{showItemDetail.n}</div>
                  <div style={{fontSize:12,color:"var(--muted)"}}>
                    {canEquipItem(showItemDetail) ? `Slot: ${getItemMetaLabel(showItemDetail)}` : `Tipo: ${getItemTypeLabel(showItemDetail)}`}
                    <span className={`badge badge-${showItemDetail.rar}`} style={{marginLeft:8}}>
                      {showItemDetail.rar==="c"?"Común":showItemDetail.rar==="u"?"Infrecuente":"Raro"}
                    </span>
                  {showItemDetail.magical && <span className="badge badge-l" style={{marginLeft:4}}>✦ Mágico</span>}
                </div>
              </div>
            </div>
            <div style={{fontSize:14,color:"var(--text)",marginBottom:10,lineHeight:1.5}}>{showItemDetail.desc}</div>
            {showItemDetail.dmg && <div style={{fontSize:13,color:"var(--gold)",marginBottom:6}}>⚔ Daño: {showItemDetail.dmg} {showItemDetail.dt}</div>}
            {showItemDetail.ac && <div style={{fontSize:13,color:"var(--gold)",marginBottom:6}}>🛡 CA: {showItemDetail.ac}{showItemDetail.acDex?" + DES":""}</div>}
            {showItemDetail.bonus && <div style={{fontSize:13,color:"#5cb85c",marginBottom:6}}>
              {Object.entries(showItemDetail.bonus).map(([k,v])=>`+${v} ${STAT_N[k]}`).join(", ")}
            </div>}
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>Valor: {showItemDetail.val} po · Peso: {showItemDetail.w} lb</div>
            <div style={{display:"flex",gap:8}}>
              {canEquipItem(showItemDetail)&&<button className="btn btn-r" style={{flex:1}} onClick={()=>{tryEquip(showItemDetail.id,showItemDetail.slot);setShowItemDetail(null);}}>
                Equipar
              </button>}
              <button className="btn" style={{flex:1}} onClick={()=>setShowItemDetail(null)}>Cerrar</button>
            </div>
          </div>
        </div>
      )}

      {/* Req warning */}
      {showReq && (
        <div className="overlay" onClick={()=>setShowReq(null)}>
          <div className="modal" style={{maxWidth:340}} onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:"Cinzel,serif",fontSize:16,color:"#E24B4A",marginBottom:10}}>⚠ Requisitos no cumplidos</div>
            <div style={{fontSize:14,color:"var(--gold)",marginBottom:6}}>{showReq.item.n}</div>
            {showReq.issues.map(i=><div key={i} style={{color:"#E24B4A",fontSize:13,marginBottom:3}}>✗ {i}</div>)}
            <div style={{fontSize:13,color:"var(--muted)",margin:"12px 0"}}>Podés intentarlo igual con penalizaciones.</div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-r" style={{flex:1}} onClick={()=>{onEquip(showReq.itemId,showReq.slot,true);setShowReq(null);}}>⚠ Intentar igual</button>
              <button className="btn" style={{flex:1}} onClick={()=>setShowReq(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── DICE PANEL ──────────────────────────────────────────────
const DicePanel = ({ char, updateRoom, playerId, canRoll, isDM, diceEnabled }) => {
  const [sel,setSel]=useState(20);
  const [cnt,setCnt]=useState(1);
  const [rolling,setRolling]=useState(false);
  const [result,setResult]=useState(null);
  const [hist,setHist]=useState([]);
  const [advMode,setAdvMode]=useState("normal");
  const [key,setKey]=useState(0);

  const roll=async(sides=sel,count=cnt,label="",adv=advMode)=>{
    if(!canRoll||rolling)return;
    setRolling(true);
    setTimeout(async()=>{
      let rolls,total,special=null;
      if(adv==="adv"||adv==="dis"){
        const r1=Math.floor(Math.random()*20)+1,r2=Math.floor(Math.random()*20)+1;
        rolls=[r1,r2];total=adv==="adv"?Math.max(r1,r2):Math.min(r1,r2);
        special=adv==="adv"?`Ventaja: [${r1},${r2}] →`:`Desventaja: [${r1},${r2}] →`;
      } else {
        rolls=Array.from({length:count},()=>Math.floor(Math.random()*sides)+1);
        total=rolls.reduce((a,b)=>a+b,0);
      }
      const r={sides,count,rolls,total,label,special,ts:Date.now()};
      setResult(r);setKey(k=>k+1);setHist(h=>[r,...h].slice(0,12));setRolling(false);
      if(char&&updateRoom){
        const txt=special?`🎲 ${special} **${total}**${label?` (${label})`:""}`:`🎲 Tiró ${count}d${sides}${label?` (${label})`:""}: [${rolls.join(",")}] = **${total}**`;
        await updateRoom(d=>({...d,messages:[...(d.messages||[]),{id:Date.now(),t:"roll",text:txt,senderName:char.name,ts:Date.now()}]}));
      }
    },650);
  };

  const getColor=(total,sides)=>{const p=total/sides;return p>0.8?"#C9A84C":p>0.5?"#5BA3E0":p<0.25?"#E24B4A":"#F0E6D3";};
  const quickRolls=char?[
    {label:"Iniciativa",fn:()=>roll(20,1,"Iniciativa","normal")},
    {label:"Ataque",fn:()=>roll(20,1,`Ataque +${mod(char.stats[CLASSES[char.class]?.pstat||"str"])+profBonus(char.level)}`)},
    {label:"Percepción",fn:()=>roll(20,1,`Percep ${modStr(char.stats.wis)}`)},
    {label:"Sigilo",fn:()=>roll(20,1,`Sigilo ${modStr(char.stats.dex)}`)},
  ]:[];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {!isDM&&!canRoll&&<div className="card" style={{padding:12,fontSize:13,lineHeight:1.5,color:"var(--muted)"}}>
        🎲 El DM todavía no habilitó las tiradas para los jugadores.
      </div>}
      {!isDM&&canRoll&&diceEnabled&&<div style={{fontSize:11,color:"var(--gold)",fontFamily:"Cinzel,serif",letterSpacing:".08em",textTransform:"uppercase"}}>
        Tiradas habilitadas por el DM
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {[4,6,8,10,12,20,100].map(d=><button key={d} className={`dice-btn${sel===d?" sel":""}`} onClick={()=>setSel(d)} disabled={!canRoll||rolling}>d{d}</button>)}
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <span style={{fontSize:12,color:"var(--muted)",fontFamily:"Cinzel,serif"}}>Cant:</span>
        {[1,2,3,4].map(n=><button key={n} className={`btn btn-sm${cnt===n?" btn-g":""}`} onClick={()=>setCnt(n)} disabled={!canRoll||rolling}>{n}</button>)}
      </div>
      {sel===20&&<div style={{display:"flex",gap:4}}>
        {[["normal","Normal"],["adv","Ventaja"],["dis","Desventaja"]].map(([v,l])=>(
          <button key={v} className={`btn btn-sm${advMode===v?" btn-g":""}`} onClick={()=>setAdvMode(v)} style={{flex:1,fontSize:10}} disabled={!canRoll||rolling}>{l}</button>
        ))}
      </div>}
      <button className="btn btn-r" onClick={()=>roll()} disabled={!canRoll||rolling} style={{width:"100%",padding:"11px",fontSize:13}}>
        {rolling?"⏳ Tirando...":"🎲 Tirar "+`${cnt>1?cnt+"d"+sel:"d"+sel}`}
      </button>
      {result&&<div key={key} className="card" style={{padding:14,textAlign:"center"}}>
        <div style={{fontSize:11,color:"var(--muted)",fontFamily:"Cinzel,serif",marginBottom:3}}>{result.special||`${result.count}d${result.sides} → [${result.rolls.join(", ")}]`}</div>
        <div className="roll-a" style={{fontSize:46,fontFamily:"Cinzel,serif",fontWeight:700,color:getColor(result.total,result.sides),lineHeight:1}}>
          {result.total}
        </div>
        {result.label&&<div style={{fontSize:11,color:"var(--muted)",marginTop:3}}>{result.label}</div>}
        {result.total===20&&result.sides===20&&<div style={{color:"#C9A84C",fontFamily:"Cinzel,serif",fontSize:12,marginTop:4}}>✦ ¡CRÍTICO!</div>}
        {result.total===1&&result.sides===20&&<div style={{color:"#E24B4A",fontFamily:"Cinzel,serif",fontSize:12,marginTop:4}}>☠ Pifia total</div>}
      </div>}
      {quickRolls.length>0&&<>
        <div style={{fontSize:10,color:"var(--muted)",fontFamily:"Cinzel,serif",letterSpacing:".1em",textTransform:"uppercase"}}>Tiradas rápidas</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
          {quickRolls.map(q=><button key={q.label} className="btn btn-sm" onClick={q.fn} style={{fontSize:10}} disabled={!canRoll||rolling}>{q.label}</button>)}
        </div>
      </>}
    </div>
  );
};

// ─── CHAR SHEET ───────────────────────────────────────────────
const CharSheet = ({ char, onUpdateHP }) => {
  const [hpDelta,setHpDelta]=useState("");
  const [slots,setSlots]=useState(null);
  useEffect(()=>{
    if(char&&CLASSES[char.class]?.caster&&char.level<=5){
      const SPELL_SLOTS={1:[2,0,0,0,0],2:[3,0,0,0,0],3:[4,2,0,0,0],4:[4,3,0,0,0],5:[4,3,2,0,0]};
      setSlots(SPELL_SLOTS[char.level]||null);
    }
  },[char]);
  if(!char)return<div style={{color:"var(--muted)",fontStyle:"italic",padding:16,fontSize:14}}>No hay personaje.</div>;
  const race=RACES[char.race],cls=CLASSES[char.class];
  const prof=profBonus(char.level),bonuses=calcBonuses(char),ac=calcAC(char);
  const hpPct=(char.currentHP/char.maxHP)*100,hpColor=hpPct>60?"#4CAF50":hpPct>25?"#FFC107":"#E24B4A";
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"Cinzel,serif",fontSize:16,color:"var(--gold)"}}>{char.name}</div>
        <div style={{fontSize:12,color:"var(--muted)"}}>{race?.n} {cls?.n} · Nv{char.level}</div>
      </div>
      <div className="card" style={{padding:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--muted)"}}>HP</span>
          <span style={{fontFamily:"Cinzel,serif",fontSize:13,color:hpColor,fontWeight:700}}>{char.currentHP}/{char.maxHP}</span>
        </div>
        <div className="hp-bar"><div className="hp-fill" style={{width:`${hpPct}%`,background:hpColor}}/></div>
        <div style={{display:"flex",gap:5,marginTop:7}}>
          <input className="inp" placeholder="±HP" value={hpDelta} onChange={e=>setHpDelta(e.target.value)} style={{fontSize:13}}
            onKeyDown={e=>e.key==="Enter"&&hpDelta&&(onUpdateHP(char.currentHP+parseInt(hpDelta)||0),setHpDelta(""))}/>
          <button className="btn btn-sm btn-r" onClick={()=>hpDelta&&(onUpdateHP(char.currentHP+parseInt(hpDelta)||0),setHpDelta(""))}>OK</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
        {[["CA",ac],["Prof",`+${prof}`],["Vel",`${race?.spd}ft`]].map(([l,v])=>(
          <div key={l} className="stat-b">
            <div style={{fontSize:9,color:"var(--muted)",fontFamily:"Cinzel,serif"}}>{l}</div>
            <div style={{fontFamily:"Cinzel,serif",fontSize:16,fontWeight:700,color:"var(--gold)"}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
        {STATS.map(s=>{const base=char.stats[s],bonus=bonuses[s]||0,total=base+bonus;return(
          <div key={s} className="stat-b">
            <div style={{fontSize:9,color:"var(--muted)",fontFamily:"Cinzel,serif"}}>{STAT_N[s]}</div>
            <div style={{fontFamily:"Cinzel,serif",fontSize:16,fontWeight:700,color:bonus>0?"var(--gold)":"var(--text)"}}>{total}{bonus>0&&<span style={{fontSize:9,color:"#5cb85c"}}>+{bonus}</span>}</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>{modStr(total)}</div>
          </div>
        );})}
      </div>
      {cls?.caster&&slots&&<div className="card" style={{padding:10}}>
        <div style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:6}}>Espacios de Hechizo</div>
        {slots.map((total,i)=>total>0&&<div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
          <span style={{fontSize:11,color:"var(--muted)",width:36}}>Nv.{i+1}</span>
          {Array.from({length:total},(_,j)=><span key={j} className="spell-slot avail">◆</span>)}
        </div>)}
      </div>}
      <div className="card" style={{padding:10}}>
        <div style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:5}}>Rasgos</div>
        {race?.traits.map(t=><div key={t} style={{fontSize:12,padding:"1px 0"}}>◈ {t}</div>)}
      </div>
    </div>
  );
};

// ─── GAME ROOM ────────────────────────────────────────────────
const GameRoom = ({ roomData, character, playerId, authUid, updateRoom, playerName, onSave, aiLoading, callAI, notify }) => {
  const [chatInput,setChatInput]=useState("");
  const [activeTab,setActiveTab]=useState("sheet");
  const [dmInput,setDmInput]=useState("");
  const [showDM,setShowDM]=useState(false);
  const [showCharModal,setShowCharModal]=useState(false);
  const [showStock,setShowStock]=useState(false);
  const [stockTargetId,setStockTargetId]=useState("");
  const [stockItemId,setStockItemId]=useState(()=>Object.keys(ITEMS)[0]||"");
  const [stockQty,setStockQty]=useState("1");
  const [coinType,setCoinType]=useState("gold");
  const [coinAmount,setCoinAmount]=useState("10");
  const chatEnd=useRef();

  const playersList=Object.values(roomData?.players||{});
  const isHost=roomData?.hostId===playerId;
  const isDM=!!((roomData?.dmUid&&authUid&&roomData.dmUid===authUid)||isHost);
  const canRoll=!!character&&(isDM||!!roomData?.diceEnabled);
  const dmStock=roomData?.dmStock||{items:{},coins:normalizeWallet()};
  const stockEntries=Object.entries(dmStock.items||{})
    .filter(([,qty])=>qty>0)
    .sort((a,b)=>{
      const ia=ITEMS[a[0]],ib=ITEMS[b[0]];
      const ta=getItemTypeLabel(ia),tb=getItemTypeLabel(ib);
      return ta.localeCompare(tb,"es")||((ia?.n||a[0]).localeCompare(ib?.n||b[0],"es"));
    });
  const stockCatalog=Object.values(ITEMS).sort((a,b)=>{
    const ta=getItemTypeLabel(a),tb=getItemTypeLabel(b);
    return ta.localeCompare(tb,"es")||a.n.localeCompare(b.n,"es");
  });
  const sideTabs=[["sheet","Ficha"],["dice","Dados"],["char","Personaje"]];
  const panelTitle=(sideTabs.find(([id])=>id===activeTab)||[])[1]||"Panel";
  const selectedItem=ITEMS[stockItemId];
  const selectedItemStock=selectedItem?(dmStock.items?.[stockItemId]||0):0;

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[roomData?.messages]);
  useEffect(()=>{
    const candidates=playersList.filter(p=>p.character);
    if(candidates.some(p=>p.id===stockTargetId))return;
    const next=candidates.find(p=>p.id!==playerId)?.id||candidates[0]?.id||"";
    setStockTargetId(next);
  },[playersList,playerId,stockTargetId]);

  const parseAmount=(value,fallback=1)=>Math.max(1,parseInt(value,10)||fallback);
  const coinLabel=(type)=>COIN_TYPES.find(c=>c.type===type)?.label||type;
  const openMobilePanel=(tab)=>{setActiveTab(tab);setShowCharModal(true);};

  const send=async()=>{
    if(!chatInput.trim())return;
    const msg={id:Date.now(),t:"player",text:chatInput,senderId:playerId,senderName:character?.name||playerName,ts:Date.now()};
    const action=chatInput;setChatInput("");
    await updateRoom(d=>({...d,messages:[...(d.messages||[]),msg]}));
    if(roomData?.dmMode==="ai")callAI(`${character?.name||playerName} (${RACES[character?.race]?.n||""} ${CLASSES[character?.class]?.n||""}) dice/hace: "${action}"`);
  };

  const sendDM=async()=>{
    if(!dmInput.trim())return;
    await updateRoom(d=>({...d,messages:[...(d.messages||[]),{id:Date.now(),t:"dm",text:dmInput,senderName:"🎭 Dungeon Master",ts:Date.now()}]}));
    setDmInput("");
  };

  const toggleDiceAccess=async()=>{
    if(!isDM)return;
    const next=!roomData?.diceEnabled;
    await updateRoom(d=>({
      ...d,
      diceEnabled:next,
      messages:[...(d.messages||[]),{id:Date.now(),t:"sys",text:next?"🎲 El DM habilitó las tiradas para los jugadores.":"⛔ El DM bloqueó las tiradas para los jugadores.",ts:Date.now()}]
    }));
    notify?.(next?"Tiradas habilitadas para jugadores":"Tiradas bloqueadas para jugadores");
  };

  const handleEquip=async(itemId,slot,force=false)=>{
    if(!character)return;
    const item=ITEMS[itemId];
    const newEq={...(character.equipment||{})};
    if(itemId===null){delete newEq[slot];}else newEq[slot]=itemId;
    const newChar={...character,equipment:newEq,ac:calcAC({...character,equipment:newEq})};
    await updateRoom(d=>({
      ...d,
      players:{...(d.players||{}),[playerId]:{...(d.players?.[playerId]||{}),character:newChar}},
      messages:force&&item?[...(d.messages||[]),{id:Date.now(),t:"sys",text:`⚠ ${character.name} intenta usar ${item.n} sin los requisitos...`,ts:Date.now()}]:(d.messages||[])
    }));
    if(force&&roomData?.dmMode==="ai")callAI(`${character.name} intentó equipar ${item.n} sin cumplir los requisitos. Narra las consecuencias.`);
  };

  const handleUpdateHP=async(newHP)=>{
    if(!character)return;
    const hp=Math.max(0,Math.min(newHP,character.maxHP));
    const newChar={...character,currentHP:hp};
    await updateRoom(d=>({...d,players:{...(d.players||{}),[playerId]:{...(d.players?.[playerId]||{}),character:newChar}}}));
  };

  const handleUpdateWallet=async(newWallet)=>{
    if(!character)return;
    const newChar={...character,wallet:normalizeWallet(newWallet)};
    await updateRoom(d=>({...d,players:{...(d.players||{}),[playerId]:{...(d.players?.[playerId]||{}),character:newChar}}}));
  };

  const adjustStockItem=async(direction=1)=>{
    if(!isDM||!selectedItem)return;
    const amount=parseAmount(stockQty,1);
    await updateRoom(d=>{
      const current=d.dmStock.items?.[stockItemId]||0;
      const next=Math.max(0,current+(direction*amount));
      const items={...(d.dmStock.items||{})};
      if(next>0)items[stockItemId]=next;else delete items[stockItemId];
      return {...d,dmStock:{...d.dmStock,items}};
    });
    notify?.(`${direction>0?"Stock cargado":"Stock ajustado"}: ${selectedItem.n} x${amount}`);
  };

  const giveStockItem=async()=>{
    if(!isDM||!selectedItem)return;
    if(!stockTargetId){notify?.("Elegí un jugador para entregar el item");return;}
    const amount=parseAmount(stockQty,1);
    let delivered=false;
    let reason="No se pudo entregar el item";
    await updateRoom(d=>{
      const available=d.dmStock.items?.[stockItemId]||0;
      const targetPlayer=d.players?.[stockTargetId];
      const targetChar=targetPlayer?.character;
      if(!targetChar){reason="Ese jugador todavía no creó su personaje";return d;}
      if(available<amount){reason="No hay suficiente stock para esa entrega";return d;}
      const items={...(d.dmStock.items||{})};
      const nextCount=available-amount;
      if(nextCount>0)items[stockItemId]=nextCount;else delete items[stockItemId];
      delivered=true;
      return{
        ...d,
        dmStock:{...d.dmStock,items},
        players:{
          ...(d.players||{}),
          [stockTargetId]:{
            ...targetPlayer,
            character:{
              ...targetChar,
              inventory:[...(targetChar.inventory||[]),...Array.from({length:amount},()=>stockItemId)],
            }
          }
        },
        messages:[...(d.messages||[]),{id:Date.now(),t:"sys",text:`🎁 El DM entregó ${amount}x ${selectedItem.n} a ${targetChar.name}.`,ts:Date.now()}]
      };
    });
    if(!delivered){notify?.(reason);return;}
    notify?.(`Entregaste ${selectedItem.n} x${amount}`);
  };

  const adjustStockCoins=async(direction=1)=>{
    if(!isDM)return;
    const amount=parseAmount(coinAmount,1);
    await updateRoom(d=>{
      const current=d.dmStock.coins?.[coinType]||0;
      const next=Math.max(0,current+(direction*amount));
      return{
        ...d,
        dmStock:{
          ...d.dmStock,
          coins:{...(d.dmStock.coins||EMPTY_WALLET),[coinType]:next}
        }
      };
    });
    notify?.(`${direction>0?"Tesoro cargado":"Tesoro ajustado"}: ${coinLabel(coinType)} ${amount}`);
  };

  const giveStockCoins=async()=>{
    if(!isDM)return;
    if(!stockTargetId){notify?.("Elegí un jugador para entregar monedas");return;}
    const amount=parseAmount(coinAmount,1);
    let delivered=false;
    let reason="No se pudieron entregar las monedas";
    await updateRoom(d=>{
      const available=d.dmStock.coins?.[coinType]||0;
      const targetPlayer=d.players?.[stockTargetId];
      const targetChar=targetPlayer?.character;
      if(!targetChar){reason="Ese jugador todavía no creó su personaje";return d;}
      if(available<amount){reason="No hay suficiente tesoro en stock";return d;}
      const targetWallet=normalizeWallet(targetChar.wallet);
      delivered=true;
      return{
        ...d,
        dmStock:{
          ...d.dmStock,
          coins:{...(d.dmStock.coins||EMPTY_WALLET),[coinType]:available-amount}
        },
        players:{
          ...(d.players||{}),
          [stockTargetId]:{
            ...targetPlayer,
            character:{
              ...targetChar,
              wallet:{...targetWallet,[coinType]:(targetWallet[coinType]||0)+amount},
            }
          }
        },
        messages:[...(d.messages||[]),{id:Date.now(),t:"sys",text:`🪙 El DM entregó ${amount} ${coinLabel(coinType).toLowerCase()} a ${targetChar.name}.`,ts:Date.now()}]
      };
    });
    if(!delivered){notify?.(reason);return;}
    notify?.(`Entregaste ${amount} ${coinLabel(coinType).toLowerCase()}`);
  };

  const renderSidePanel=()=>(
    activeTab==="sheet"
      ? <CharSheet char={character} onUpdateHP={handleUpdateHP}/>
      : activeTab==="dice"
        ? <DicePanel char={character} updateRoom={updateRoom} playerId={playerId} canRoll={canRoll} isDM={isDM} diceEnabled={!!roomData?.diceEnabled}/>
        : <L2CharacterPanel char={character} onEquip={handleEquip} onUpdateHP={handleUpdateHP} onUpdateWallet={handleUpdateWallet}/>
  );

  const msgColor=(t)=>t==="dm"?"#E8C9A0":t==="roll"?"#7BAED4":t==="sys"?"#9A8A72":"var(--text)";

  return(
    <div className="game-wrap">
      <style>{CSS}</style>

      {/* Header */}
      <div style={{background:"var(--bg1)",borderBottom:"1px solid var(--border)",padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
          <span style={{fontFamily:"Cinzel,serif",fontSize:15,color:"var(--gold)",whiteSpace:"nowrap"}}>⚔ {roomData?.name}</span>
          <span style={{fontSize:10,color:"var(--muted)",fontFamily:"Cinzel,serif",padding:"2px 7px",border:"1px solid var(--border)",borderRadius:2,whiteSpace:"nowrap"}}>{roomData?.id}</span>
          <span className="online-dot"/><span style={{fontSize:10,color:"#4CAF50",fontFamily:"Cinzel,serif"}}>Online</span>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          <span style={{fontSize:10,color:"var(--muted)"}}>{playersList.length}/10</span>
          {isDM&&<button className="btn btn-sm" onClick={()=>setShowDM(!showDM)} style={{fontSize:10}}>🎭 DM</button>}
          <button className="btn btn-sm" onClick={onSave} style={{fontSize:10}}>💾</button>
        </div>
      </div>

      {/* DM Panel */}
      {showDM&&isDM&&<div style={{background:"rgba(139,26,26,.12)",borderBottom:"1px solid rgba(139,26,26,.3)",padding:"9px 14px",display:"flex",flexDirection:"column",gap:8}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--crimson2)",textTransform:"uppercase",whiteSpace:"nowrap"}}>DM →</span>
          <input className="inp" placeholder="Narración..." value={dmInput} onChange={e=>setDmInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendDM()} style={{flex:1,minWidth:180,fontSize:13}}/>
          <button className="btn btn-r btn-sm" onClick={sendDM}>Narrar</button>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <button className={`btn btn-sm${roomData?.diceEnabled?" btn-g":""}`} onClick={toggleDiceAccess}>
            {roomData?.diceEnabled?"⛔ Bloquear tiradas":"🎲 Habilitar tiradas"}
          </button>
          <button className="btn btn-sm" onClick={()=>setShowStock(true)}>🎁 Stock del DM</button>
          <span style={{fontSize:11,color:"var(--muted)"}}>
            {roomData?.diceEnabled?"Los jugadores ya pueden tirar dados.":"Los jugadores tienen los dados bloqueados."}
          </span>
        </div>
      </div>}

      {/* Players bar */}
      <div style={{background:"var(--bg2)",borderBottom:"1px solid var(--border)",padding:"5px 14px",display:"flex",gap:10,overflowX:"auto",flexShrink:0}}>
        {playersList.map(p=>{
          const c=p.character;
          const hp=c?(c.currentHP/c.maxHP)*100:null;
          const hC=hp>60?"#4CAF50":hp>25?"#FFC107":"#E24B4A";
          const playerIsDM=(p.authUid&&p.authUid===roomData?.dmUid)||p.id===roomData?.hostId;
          return(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:7,padding:"3px 9px",background:"rgba(0,0,0,.3)",border:`1px solid ${p.id===playerId?"var(--gold)":"var(--border)"}`,borderRadius:3,flexShrink:0}}>

              </span>
              {c&&<span style={{fontSize:11,color:hC,fontFamily:"Cinzel,serif"}}>{c.currentHP}/{c.maxHP}</span>}
            </div>
          );
        })}

      {/* Body */}
      <div className="game-body">
        {/* Chat */}
        <div className="chat-col">
          <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:7}}>

            <div className="mobile-quickbar">
              <button className="btn btn-sm" onClick={()=>openMobilePanel("sheet")}>📜 Ficha</button>
              <button className={`btn btn-sm${activeTab==="dice"?" btn-g":""}`} onClick={()=>openMobilePanel("dice")}>
                {!isDM&&!roomData?.diceEnabled?"🎲 Dados 🔒":"🎲 Dados"}

            </div>
            <div style={{display:"flex",gap:8}}>
              <input className="inp" placeholder={character?"¿Qué hace tu personaje?":"Crea tu personaje primero..."}
                value={chatInput} onChange={e=>setChatInput(e.target.value)}

              <button className="btn btn-r" onClick={send} disabled={!character||!chatInput.trim()}>Enviar</button>
            </div>

        </div>

        {/* Right panel — desktop only */}
        <div className="right-col">
          <div style={{display:"flex",borderBottom:"1px solid var(--border)",flexShrink:0}}>
            {sideTabs.map(([id,label])=>(
              <button key={id} className={`tab${activeTab===id?" act":""}`} style={{flex:1}} onClick={()=>setActiveTab(id)}>{label}</button>
            ))}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:12}}>
            {renderSidePanel()}
          </div>
        </div>
      </div>

      {/* Mobile adventure modal */}
      {showCharModal&&(
        <div className="overlay" onClick={()=>setShowCharModal(false)}>
          <div className="l2-modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:"1px solid var(--border)"}}>
              <span style={{fontFamily:"Cinzel,serif",color:"var(--gold)",fontSize:15}}>⚔ {panelTitle}</span>
              <button className="btn btn-sm" onClick={()=>setShowCharModal(false)}>✕ Cerrar</button>
            </div>
            <div style={{display:"flex",borderBottom:"1px solid var(--border)"}}>
              {sideTabs.map(([id,label])=>(
                <button key={id} className={`tab${activeTab===id?" act":""}`} style={{flex:1}} onClick={()=>setActiveTab(id)}>{label}</button>
              ))}

      {showStock&&isDM&&(

              <div>
                <div style={{fontFamily:"Cinzel,serif",fontSize:18,color:"var(--gold)"}}>🎁 Stock del DM</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>Armá tesoro de campaña y repartilo cuando haga falta.</div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12,marginBottom:14}}>

                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <select className="sel" value={stockItemId} onChange={e=>setStockItemId(e.target.value)} style={{width:"100%"}}>
                    {stockCatalog.map(item=>(
                      <option key={item.id} value={item.id}>{getItemTypeLabel(item)} · {item.n}</option>

                  </select>
                  <input className="inp" value={stockQty} onChange={e=>setStockQty(e.target.value)} inputMode="numeric" placeholder="Cantidad" />
                  <div style={{fontSize:12,color:"var(--muted)"}}>

                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

                    <button className="btn btn-sm" onClick={()=>adjustStockItem(-1)}>Quitar stock</button>

};

const CharacterCreation = ({ onComplete, playerName }) => {
  const [step,setStep]=useState(0);
  const [name,setName]=useState(playerName||"");
  const [race,setRace]=useState(null);
  const [bodyType,setBodyType]=useState("male");
  const [cls,setCls]=useState(null);
  const [stats,setStats]=useState({str:15,dex:14,con:13,int:12,wis:10,cha:8});
  const [assigns,setAssigns]=useState({});
  const [pool]=useState([...STANDARD]);
  const [used,setUsed]=useState([]);

  const assignStat=(stat,idx)=>{
    if(used.includes(idx)&&assigns[stat]!==idx)return;
    const na={...assigns},nu=used.filter(u=>u!==assigns[stat]);
    na[stat]=idx;nu.push(idx);setAssigns(na);setUsed(nu);
    const ns={...stats};Object.entries(na).forEach(([s,i])=>{ns[s]=pool[i];});setStats(ns);
  };

  const finalize=()=>{
    if(!name.trim()||!race||!cls)return;
    const raceBonus=RACES[race].bonus,finalStats={...stats};
    Object.entries(raceBonus).forEach(([s,v])=>{finalStats[s]=(finalStats[s]||10)+v;});
    const level=1,hp=maxHP(cls,level,finalStats.con);
    const{equipment,inventory}=buildStarterLoadout(cls);
    const char={name:name.trim(),race,class:cls,level,stats:finalStats,currentHP:hp,maxHP:hp,ac:0,equipment,inventory,appearance:{bodyType},wallet:{gold:10,silver:5,copper:20}};
    char.ac=calcAC(char);
    onComplete(char);
  };

  const steps=["Raza","Clase","Atributos","Resumen"];
  const starterLoadout=cls?buildStarterLoadout(cls):{equipment:{},inventory:[]};
  const preview=race&&cls?{race,class:cls,stats,equipment:starterLoadout.equipment,appearance:{bodyType}}:null;

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <style>{CSS}</style>
      {/* Progress */}
      <div style={{display:"flex",gap:0,marginBottom:28,background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:3,padding:2}}>
        {steps.map((s,i)=>(
          <div key={i} style={{padding:"6px 14px",fontFamily:"Cinzel,serif",fontSize:11,letterSpacing:".08em",textTransform:"uppercase",
            background:i===step?"rgba(201,168,76,.18)":"transparent",color:i===step?"var(--gold)":i<step?"#5cb85c":"var(--muted)",
            borderRight:i<steps.length-1?"1px solid var(--border)":"none",cursor:i<step?"pointer":"default"}}
            onClick={()=>i<step&&setStep(i)}>{i<step?"✓ ":""}{s}</div>
        ))}
      </div>
      <div style={{width:"100%",maxWidth:760}}>
        {/* STEP 0 */}
        {step===0&&<div>
          <h2 style={{fontFamily:"Cinzel,serif",color:"var(--gold)",textAlign:"center",marginBottom:20,fontSize:22}}>Nombre y Raza</h2>
          <input className="inp" placeholder="Nombre del personaje..." value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:16,fontSize:17,textAlign:"center"}}/>
          <div style={{display:"flex",gap:8,marginBottom:16,justifyContent:"center"}}>
            {[{id:"male",label:"⚔ Varón"},{id:"female",label:"✨ Mujer"}].map(opt=>(
              <button key={opt.id} className={`btn${bodyType===opt.id?" btn-g":""}`} onClick={()=>setBodyType(opt.id)}>{opt.label}</button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:8}}>
            {Object.entries(RACES).map(([id,r])=>(
              <div key={id} className={`rc${race===id?" sel":""}`} onClick={()=>setRace(id)}>
                <div style={{fontSize:22,marginBottom:4}}>{r.e}</div>
                <div style={{fontFamily:"Cinzel,serif",fontSize:13,color:"var(--gold)",marginBottom:2}}>{r.n}</div>
                <div style={{fontSize:11,color:"var(--muted)",marginBottom:5,lineHeight:1.4}}>{r.desc}</div>
                <div style={{fontSize:10,color:"#5cb85c"}}>{Object.entries(r.bonus).map(([s,v])=>`${STAT_N[s]} +${v}`).join(" · ")}</div>
              </div>
            ))}
          </div>
          <div style={{textAlign:"center",marginTop:18}}>
            <button className="btn btn-r" disabled={!name.trim()||!race} onClick={()=>setStep(1)} style={{padding:"11px 40px",fontSize:14}}>Continuar →</button>
          </div>
        </div>}

        {/* STEP 1 */}
        {step===1&&<div>
          <h2 style={{fontFamily:"Cinzel,serif",color:"var(--gold)",textAlign:"center",marginBottom:20,fontSize:22}}>Elige tu Clase</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:8}}>
            {Object.entries(CLASSES).map(([id,c])=>(
              <div key={id} className={`rc${cls===id?" sel":""}`} onClick={()=>setCls(id)}>
                <div style={{fontSize:20,marginBottom:3}}>{c.e}</div>
                <div style={{fontFamily:"Cinzel,serif",fontSize:13,color:"var(--gold)",marginBottom:2}}>{c.n}</div>
                <div style={{fontSize:11,color:"var(--muted)",marginBottom:4,lineHeight:1.4}}>{c.desc}</div>
                <div style={{fontSize:10,color:"var(--muted)"}}>d{c.hd} · {c.armorProf}</div>
                {c.caster&&<div style={{fontSize:10,color:"#7BAED4",marginTop:2}}>✦ Lanzador</div>}
              </div>
            ))}
          </div>
          <div style={{textAlign:"center",marginTop:18,display:"flex",gap:10,justifyContent:"center"}}>
            <button className="btn" onClick={()=>setStep(0)}>← Volver</button>
            <button className="btn btn-r" disabled={!cls} onClick={()=>setStep(2)} style={{padding:"11px 40px",fontSize:14}}>Continuar →</button>
          </div>
        </div>}

        {/* STEP 2 */}
        {step===2&&<div>
          <h2 style={{fontFamily:"Cinzel,serif",color:"var(--gold)",textAlign:"center",marginBottom:20,fontSize:22}}>Atributos</h2>
          <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:260}}>
              <p style={{color:"var(--muted)",fontSize:13,marginBottom:16,lineHeight:1.5}}>Asigna los valores ({STANDARD.join(", ")}) a tus atributos. Los bonos raciales se aplican automáticamente.</p>
              <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
                {STANDARD.map((v,i)=>(
                  <div key={i} style={{padding:"5px 11px",fontFamily:"Cinzel,serif",fontSize:15,fontWeight:700,
                    background:used.includes(i)?"rgba(0,0,0,.3)":"rgba(201,168,76,.15)",
                    border:`1px solid ${used.includes(i)?"var(--border)":"var(--gold)"}`,
                    color:used.includes(i)?"var(--muted)":"var(--gold)",borderRadius:2,opacity:used.includes(i)?.5:1}}>{v}</div>
                ))}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {STATS.map(s=>{const rb=RACES[race]?.bonus[s]||0,base=stats[s],total=base+rb;return(
                  <div key={s} style={{display:"flex",alignItems:"center",gap:9}}>
                    <div style={{width:36,fontFamily:"Cinzel,serif",fontSize:12,color:"var(--muted)",textTransform:"uppercase"}}>{STAT_N[s]}</div>
                    <select className="sel" value={assigns[s]??""} onChange={e=>e.target.value!==""&&assignStat(s,parseInt(e.target.value))} style={{flex:1}}>
                      <option value="">— elegir —</option>
                      {STANDARD.map((v,i)=>(!used.includes(i)||assigns[s]===i)&&<option key={i} value={i}>{v}</option>)}
                    </select>
                    <div style={{width:70,textAlign:"right",fontFamily:"Cinzel,serif",fontSize:14,fontWeight:700,color:"var(--gold)"}}>
                      {total}{rb>0&&<span style={{fontSize:10,color:"#5cb85c"}}>(+{rb})</span>}
                      <span style={{fontSize:11,color:"var(--muted)",marginLeft:3}}>{modStr(total)}</span>
                    </div>
                  </div>
                );})}
              </div>
            </div>
            {preview&&<div style={{width:150,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
              <div style={{width:120,height:160}}><CharSVG char={preview}/></div>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:"Cinzel,serif",fontSize:12,color:"var(--gold)"}}>{RACES[race]?.n}</div>
                <div style={{fontFamily:"Cinzel,serif",fontSize:12,color:"var(--text)"}}>{CLASSES[cls]?.n}</div>
                <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>HP est: {maxHP(cls,1,stats.con+(RACES[race]?.bonus.con||0))}</div>
              </div>
            </div>}
          </div>
          <div style={{textAlign:"center",marginTop:18,display:"flex",gap:10,justifyContent:"center"}}>
            <button className="btn" onClick={()=>setStep(1)}>← Volver</button>
            <button className="btn btn-r" disabled={used.length<6} onClick={()=>setStep(3)} style={{padding:"11px 40px",fontSize:14}}>Ver resumen →</button>
          </div>
        </div>}

        {/* STEP 3 */}
        {step===3&&<div>
          <h2 style={{fontFamily:"Cinzel,serif",color:"var(--gold)",textAlign:"center",marginBottom:20,fontSize:22}}>Resumen</h2>
          <div style={{display:"flex",gap:24,flexWrap:"wrap",justifyContent:"center"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
              <div style={{width:130,height:174}}>
                <CharSVG char={{name:name.trim()||"Aventurero",race,class:cls,stats,equipment:starterLoadout.equipment,appearance:{bodyType}}}/>
              </div>
              <div style={{fontFamily:"Cinzel,serif",fontSize:16,color:"var(--gold)"}}>{name}</div>
              <div style={{color:"var(--muted)",fontSize:12}}>{RACES[race]?.n} {CLASSES[cls]?.n} · Nivel 1</div>
              <div style={{display:"flex",gap:8,fontSize:12,color:"var(--muted)"}}>
                <span>💰 10 po</span><span>🥈 5 pp</span><span>🟤 20 pc</span>
              </div>
            </div>
            <div style={{flex:1,minWidth:220}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                {STATS.map(s=>{const rb=RACES[race]?.bonus[s]||0,total=stats[s]+rb;return(
                  <div key={s} className="stat-b">
                    <div style={{fontSize:9,color:"var(--muted)",fontFamily:"Cinzel,serif"}}>{STAT_N[s]}</div>
                    <div style={{fontFamily:"Cinzel,serif",fontSize:18,fontWeight:700,color:"var(--gold)"}}>{total}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>{modStr(total)}</div>
                  </div>
                );})}
              </div>
              <div className="card" style={{padding:10,marginBottom:10}}>
                <div style={{fontFamily:"Cinzel,serif",fontSize:10,color:"var(--muted)",marginBottom:5,textTransform:"uppercase"}}>Equipo inicial</div>
                {starterLoadout.inventory.map(id=>{const it=ITEMS[id];if(!it)return null;
                  const eq=starterLoadout.equipment[it.slot]===id;
                  return<span key={id} className={`badge ${eq?"badge-l":"badge-c"}`} style={{marginRight:4,marginBottom:4}}>{it.e} {it.n}</span>;
                })}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn" onClick={()=>setStep(2)}>← Volver</button>
                <button className="btn btn-r" style={{flex:1,padding:"12px",fontSize:14}} onClick={finalize}>⚔ ¡Comenzar!</button>
              </div>
            </div>
          </div>
        </div>}
      </div>
    </div>
  );
};

const AuthCard = ({ authReady, authUser, account, ownerExists, onLogin, onRegister, onLogout, onClaimOwner, onRequestDM }) => {
  const [tab,setTab]=useState("login");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [displayName,setDisplayName]=useState("");
  const [requestName,setRequestName]=useState("");
  const [working,setWorking]=useState(false);

  useEffect(()=>{
    if(authUser){
      const fallback=account?.displayName||authUser.displayName||"";
      setRequestName(fallback);
      setDisplayName(fallback);
    }
  },[authUser,account]);

  const submitLogin=async()=>{
    if(!email.trim()||!password)return;
    setWorking(true);
    try{await onLogin({email:email.trim(),password});setEmail("");setPassword("");}
    finally{setWorking(false);}
  };
  const submitRegister=async()=>{
    if(!displayName.trim()||!email.trim()||password.length<6)return;
    setWorking(true);
    try{await onRegister({displayName:displayName.trim(),email:email.trim(),password});setEmail("");setPassword("");}
    finally{setWorking(false);}
  };
  const submitRequestDM=async()=>{
    if(!requestName.trim())return;
    setWorking(true);
    try{await onRequestDM({displayName:requestName.trim()});}
    finally{setWorking(false);}
  };

const handleAuthLogin=async({email,password})=>{
  try{
    await authApi.signIn(email,password);
    notify("Sesión iniciada");
  }catch(e){
    notify(friendlyAuthError(e));
  }
};

const handleAuthRegister=async({displayName,email,password})=>{
  try{
    const cred=await authApi.register(email,password);
    if(displayName.trim()){
      await authApi.updateProfile(cred.user,{displayName:displayName.trim()});
    }
    notify(ownerExists
      ? "Cuenta creada. Ahora pedí acceso DM."
      : "Cuenta creada. Si es tuya, reclamá el rol Owner."
    );
  }catch(e){
    notify(friendlyAuthError(e));
  }
};

  const handleAuthLogout=async()=>{
    try{
      await authApi.signOut();
      setScreen("lobby");
      notify("Sesión cerrada");
    }catch(e){notify("No se pudo cerrar la sesión");}
  };

  const handleClaimOwner=async()=>{
    if(!authUser)return notify("Primero iniciá sesión.");
    if(ownerExists&&ownerUid!==authUser.uid)return notify("Ya existe un Owner global.");
    try{
      const record=buildAccountRecord(authUser,{
        displayName:authUser.displayName||authUser.email?.split("@")[0]||"Owner",
        role:OWNER_ROLE,
        status:STATUS_APPROVED,
        approvedAt:Date.now(),
        approvedBy:authUser.uid,
      });
      await fb.set(`users/${authUser.uid}`,record);
      await fb.set("system",{ownerUid:authUser.uid,ownerName:record.displayName,updatedAt:Date.now()});
      notify("Owner global configurado");
    }catch(e){notify("No se pudo reclamar el rol Owner.");}
  };

  const handleRequestDm=async({displayName})=>{
    if(!authUser)return notify("Primero iniciá sesión.");
    try{
      if(displayName.trim()&&(authUser.displayName||"")!==displayName.trim()){
        await authApi.updateProfile(authUser,{displayName:displayName.trim()});
      }
      const record=buildAccountRecord(authUser,{
        displayName:displayName.trim(),
        role:DM_ROLE,
        status:STATUS_PENDING,
        requestedAt:Date.now(),
      });
      await fb.set(`users/${authUser.uid}`,record);
      notify("Solicitud DM enviada al Owner");
    }catch(e){notify(friendlyAuthError(e));}
  };

  const handleApproveDm=async(uid)=>{
    if(!isOwner)return notify("Solo el Owner puede aprobar DMs.");
    const current=accounts?.[uid];
    if(!current)return notify("No encontré esa solicitud.");
    try{
      await fb.set(`users/${uid}`,{
        ...current,
        role:DM_ROLE,
        status:STATUS_APPROVED,
        approvedAt:Date.now(),
        approvedBy:authUser.uid,
        revokedAt:null,
        revokedBy:null,
      });
      notify(`DM aprobado: ${current.displayName||current.email}`);
    }catch(e){notify("No se pudo aprobar ese DM.");}
  };

  const handleRevokeDm=async(uid)=>{
    if(!isOwner)return notify("Solo el Owner puede revocar DMs.");
    const current=accounts?.[uid];
    if(!current)return notify("No encontré esa cuenta.");
    try{
      await fb.set(`users/${uid}`,{
        ...current,
        role:DM_ROLE,
        status:STATUS_REVOKED,
        revokedAt:Date.now(),
        revokedBy:authUser.uid,
      });
      notify(`Acceso revocado: ${current.displayName||current.email}`);
    }catch(e){notify("No se pudo revocar ese DM.");}
  };

  // ── Firebase room listener ──
  useEffect(()=>{
    if(!roomId)return;
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=fb.listen(`rooms/${roomId}`,(data)=>{
      if(!data)return;
      const normalized=normalizeRoom(data);
      setRoomData(normalized);
      const me=normalized.players?.[playerId];
      setCharacter(me?.character||null);
    });
    return()=>{if(unsubRef.current)unsubRef.current();};
  },[roomId,playerId]);

  const updateRoom=async(updater)=>{
    try{
      const curRaw=await fb.get(`rooms/${roomId}`);
      const cur=normalizeRoom(curRaw||roomData);
      const updated=normalizeRoom({...updater(cur),lastActivityAt:Date.now()});
      await fb.set(`rooms/${roomId}`,updated);
      syncSessionIndex(updated);
      setRoomData(updated);
      const me=updated?.players?.[playerId];
      setCharacter(me?.character||null);
      return updated;
    }catch(e){console.error("updateRoom error",e);}
  };

  const callAI=async(prompt,secret=false)=>{
    setAiLoading(true);
    try{
      const players=Object.values(roomData?.players||{}).filter(p=>p.character).map(p=>`${p.name}: ${RACES[p.character.race]?.n} ${CLASSES[p.character.class]?.n} Nv${p.character.level} HP:${p.character.currentHP}/${p.character.maxHP}`).join(", ")||"ninguno aún";
      const history=(roomData?.messages||[]).slice(-8).map(m=>`${m.senderName||"Sistema"}: ${m.text}`).join("\n");
      const sys=`Eres el Dungeon Master de una partida de D&D 5e en español. Grupo: ${players}. Historial reciente:\n${history}\n\nSé épico, narrativo y aplica las reglas D&D 5e con precisión. Responde en español. Máximo 3 párrafos.`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      const text=data.content?.[0]?.text||"El DM contempla en silencio...";
      if(!secret)await updateRoom(d=>({...d,messages:[...(d.messages||[]),{id:Date.now(),t:"dm",text,senderName:"🎲 Dungeon Master",ts:Date.now()}]}));
      setAiLoading(false);
      return text;
    }catch(e){setAiLoading(false);notify("Error conectando con el DM IA");}
  };

  const createRoom=async(name,dmMode,roomName)=>{
    if(!canCreateRoom||!authUser){notify("Solo el Owner o un DM aprobado pueden crear partidas.");return;}
    const activeManagedRooms=sessions.filter(s=>s.dmUid===authUser.uid&&(s.lifecycleStatus||"active")==="active");
    if(activeManagedRooms.length>=ACTIVE_ROOM_LIMIT){notify(`Límite alcanzado: ${ACTIVE_ROOM_LIMIT} partidas activas por DM.`);return;}
    const id=genId(6);
    const safeName=name.trim();
    const title=roomName?.trim()||`Sala de ${safeName}`;
    const dmDisplayName=account?.displayName||authUser.displayName||safeName;
    const room=normalizeRoom({
      id,name:title,hostId:playerId,
      dmUid:authUser.uid,dmName:dmDisplayName,createdByUid:authUser.uid,
      dmMode,dmPlayerId:playerId,diceEnabled:false,
      dmStock:{items:{},coins:normalizeWallet()},
      players:{[playerId]:{id:playerId,authUid:authUser.uid,name:safeName,isHost:true,isDM:true,character:null,connected:true}},
      messages:[{id:Date.now(),t:"sys",text:`🏰 Sala creada. Código: ${id}`,ts:Date.now()}],
      gameState:"lobby",createdAt:Date.now(),lastActivityAt:Date.now(),lifecycleStatus:"active",
    });
    await fb.set(`rooms/${id}`,room);
    await syncSessionIndex(room);
    setRoomId(id);setRoomData(room);setPlayerName(safeName);
    setScreen("character");
    notify(`✦ Partida creada: ${title} · Código: ${id}`);
  };

  const joinRoom=async(name,code)=>{
    const safeName=name.trim();
    const c=code.trim().toUpperCase();
    try{
      const data=normalizeRoom(await fb.get(`rooms/${c}`));
      if(!data){notify("Sala no encontrada");return;}
      const players=data.players||{};
      const existing=players[playerId];
      if(existing){
        await syncSessionIndex(data);
        setRoomId(c);setRoomData(data);setPlayerName(safeName);
        if(existing.character){setCharacter(existing.character);setScreen("game");}
        else setScreen("character");
        return;
      }
      const sameAuthEntry=authUser?Object.entries(players).find(([id,p])=>id!==playerId&&p.authUid===authUser.uid):null;
      const sameNameEntry=Object.entries(players).find(([id,p])=>id!==playerId&&nameKey(p.name)===nameKey(safeName));
      const recoveredEntry=sameAuthEntry||sameNameEntry;
      if(recoveredEntry){
        const [oldId,oldPlayer]=recoveredEntry;
        const reclaimedPlayers={...players};
        delete reclaimedPlayers[oldId];
        reclaimedPlayers[playerId]={...oldPlayer,id:playerId,name:safeName,authUid:oldPlayer.authUid||authUser && authUser.uid||null,connected:true};
        const reclaimed=normalizeRoom({
          ...data,
          hostId:data.hostId===oldId?playerId:data.hostId,
          dmPlayerId:data.dmPlayerId===oldId?playerId:data.dmPlayerId,
          dmUid:data.dmUid||authUser && authUser.uid||null,
          players:reclaimedPlayers,
          messages:[...(data.messages||[]),{id:Date.now(),t:"sys",text:`↩ ${safeName} volvió a la partida.`,ts:Date.now()}],
          lastActivityAt:Date.now(),
        });
        await fb.set(`rooms/${c}`,reclaimed);
        await syncSessionIndex(reclaimed);
        setRoomId(c);setRoomData(reclaimed);setPlayerName(safeName);
        if(reclaimed.players?.[playerId]?.character){setCharacter(reclaimed.players[playerId].character);setScreen("game");}
        else setScreen("character");
        notify("Recuperaste tu lugar en la partida");
        return;
      }
      if(Object.keys(players).length>=10){notify("Sala llena (máx. 10)");return;}
      const updated=normalizeRoom({...data,
        players:{...players,[playerId]:{id:playerId,authUid:authUser && authUser.uid||null,name:safeName,isHost:false,isDM:false,character:null,connected:true}},
        messages:[...(data.messages||[]),{id:Date.now(),t:"sys",text:`⚔ ${safeName} se unió a la aventura.`,ts:Date.now()}],
        lastActivityAt:Date.now(),
      });
      await fb.set(`rooms/${c}`,updated);
      await syncSessionIndex(updated);
      setRoomId(c);setRoomData(updated);setPlayerName(safeName);
      setScreen("character");
    }catch(e){notify("Error al unirse. Verificá el código.");}
  };

  const completeCharacter=async(char)=>{
    setCharacter(char);
    await updateRoom(d=>({
      ...d,
      players:{...(d.players||{}),[playerId]:{...(d.players?.[playerId]||{}),character:char}},
      messages:[...(d.messages||[]),{id:Date.now(),t:"sys",text:`🎭 ${playerName} entró como ${RACES[char.race]?.n} ${CLASSES[char.class]?.n}: ${char.name}.`,ts:Date.now()}]
    }));
    setScreen("game");
    if(roomData?.dmMode==="ai"||roomData?.dmMode==="hybrid"){
      setTimeout(()=>callAI(`${playerName} creó su personaje: ${char.name}, ${RACES[char.race]?.n} ${CLASSES[char.class]?.n} nivel 1. HP:${char.maxHP} CA:${char.ac}. Dale una bienvenida épica (2 párrafos).`),800);
    }
  };

  const saveSession=async()=>{
    try{
      await syncSessionIndex(roomData);
      notify("💾 Sesión guardada en Firebase");
    }catch(e){notify("Error guardando sesión");}
  };

  return(
  <>
    {notif&&<div className="notif">{notif}</div>}

    {screen==="lobby"&&<Lobby
      onCreateRoom={createRoom}
      onJoinRoom={joinRoom}
      sessions={sessions}
      lastRoom={lastRoom}
      initialName={playerName||authUser?.displayName||""}
      authReady={controlReady}
      authUser={authUser}
      account={account}
      ownerExists={ownerExists}
      canCreateRoom={canCreateRoom}
      onAuthLogin={handleAuthLogin}
      onAuthRegister={handleAuthRegister}
      onAuthLogout={handleAuthLogout}
      onClaimOwner={handleClaimOwner}
      onRequestDM={handleRequestDm}
      showOwnerPanel={isOwner}
      ownerAccount={account}
      pendingDMs={pendingDMs}
      approvedDMs={approvedDMs}
      onApproveDm={handleApproveDm}
      onRevokeDm={handleRevokeDm}
    />}

    {screen==="character"&&(
      <CharacterCreation 
        onComplete={completeCharacter} 
        playerName={playerName}
      />
    )}

    {screen==="game"&&roomData&&(
      <>
        <GameRoom 
          roomData={roomData} 
          character={character} 
          playerId={playerId} 
          authUid={(authUser && authUser.uid)||null} 
          updateRoom={updateRoom} 
          playerName={playerName} 
          onSave={saveSession} 
          aiLoading={aiLoading} 
          callAI={callAI} 
          notify={notify}
        />

        {/* 🔥 SOLICITUDES DM */}
        {pendingDMs.length > 0 && (
          <div style={{marginTop:20, padding:10, border:"1px solid gray"}}>
            <h3>Solicitudes DM</h3>

            {pendingDMs.map((dm,i) => (
              <div key={i} style={{marginBottom:8}}>
                <div>{dm.email}</div>
                <div>Estado: pendiente</div>
              </div>
            ))}
          </div>
        )}
      </>
    )}
  </>
);
}
window.addEventListener("firebase-ready", () => {
  console.log("🔥 Firebase listo, iniciando app");

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
});
