window._registerUser = async (email, password, displayName) => {
  try {
    const cred = await window._fbCreateUser(window._fbAuth, email, password);
    const user = cred.user;

    // ðŸ” Verificar si ya hay usuarios
    const snap = await window._fbGet(
     window._fbRef(window._fbDb, "users")
    );
    const accounts = snap.exists() ? snap.val() : null;

    const isFirstUser = !accounts || Object.keys(accounts).length === 0;

    // ðŸ§  Definir rol
    const role = isFirstUser ? "owner" : "dm";
    const status = isFirstUser ? "approved" : "pending";

    // ðŸ’¾ Guardar usuario con rol
    await window._fbSet(
      window._fbRef(window._fbDb, `users/${user.uid}`),
      {
        uid: user.uid,
        email: user.email,
        displayName: displayName || "",
        role,
        status,
        requestedAt: Date.now(),
        approvedAt: isFirstUser ? Date.now() : null,
      }
    );

    return user;
  } catch (err) {
    console.error("Error en registro:", err);
    throw err;
  }
}

const { useState, useEffect, useRef, useCallback } = React;

// â”€â”€â”€ FIREBASE HELPERS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const fb = {
  ref: (path) => window._fbRef(window._fbDb, path),
  set: (path, val) => window._fbSet(window._fbRef(window._fbDb, path), val),
  get: async (path) => {
    const snap = await window._fbGet(window._fbRef(window._fbDb, path));
    return snap.exists() ? snap.val() : null;
  },
  update: (path, val) =>
    window._fbUpdate(window._fbRef(window._fbDb, path), val),
  listen: (path, cb) =>
    window._fbOnValue(
      window._fbRef(window._fbDb, path),
      (snap) => cb(snap.exists() ? snap.val() : null)
    ),
  push: (path, val) =>
    window._fbPush(window._fbRef(window._fbDb, path), val),
};

const authApi = {
  current: () => window._fbAuth?.currentUser || null,
  listen: (cb) => window._fbOnAuthStateChanged(window._fbAuth, cb),

  signIn: (email, password) =>
    window._fbSignIn(window._fbAuth, email, password),

  signInAnonymously: () =>
    window._fbSignInAnonymously(window._fbAuth),

  register: async (email, password, displayName) => {
    try {
      const cred = await window._fbCreateUser(window._fbAuth, email, password);
      const user = cred.user;

      const snap = await window._fbGet(
        window._fbRef(window._fbDb, 'users')
      );
      const accounts = snap.exists() ? snap.val() : null;

      const isFirstUser =
        !accounts || Object.keys(accounts).length === 0;

      const role = isFirstUser ? "owner" : "dm";
      const status = isFirstUser ? "approved" : "pending";

      await window._fbSet(
        window._fbRef(window._fbDb, `users/${user.uid}`),
        {
          uid: user.uid,
          email: user.email,
          displayName: displayName || "",
          role,
          status,
          requestedAt: Date.now(),
          approvedAt: isFirstUser ? Date.now() : null,
        }
      );

      return user;
    } catch (err) {
      console.error("Error en registro:", err);
      throw err;
    }
  },

  signOut: () => window._fbSignOut(window._fbAuth),

  updateProfile: (user, data) =>
    window._fbUpdateProfile(user, data),
};

const buildStarterLoadout=(cls)=>{
  const equipment={},owned=[],seen=new Set();
  const add=(id)=>{if(!ITEMS[id]||seen.has(id))return;seen.add(id);owned.push(id);};
  (CLASS_ITEMS[cls]||[]).forEach(id=>{const it=ITEMS[id];if(!it)return;if(!equipment[it.slot])equipment[it.slot]=id;add(id);});
  [...(STYLE_LOADOUTS.all||[]),...(STYLE_LOADOUTS[cls]||[])].forEach(add);
  return{equipment,inventory:owned};
};

const normalizeRoom=room=>{
  if(!room)return room;
  const players=Object.fromEntries(Object.entries(room.players||{}).map(([id,p])=>[
    id,
    {
      ...p,
      isHost:id===room.hostId||!!p.isHost,
      isDM:id===room.hostId,
      character:normalizeCharacter(p.character),
    }
  ]));
  return{
    ...room,
    dmPlayerId:room.hostId||room.dmPlayerId||null,
    dmUid:room.dmUid||null,
    dmName:room.dmName||"",
    createdByUid:room.createdByUid||room.dmUid||null,
    lifecycleStatus:room.lifecycleStatus||"active",
    lastActivityAt:room.lastActivityAt||room.createdAt||Date.now(),
    diceEnabled:!!room.diceEnabled,
    dmStock:{
      items:{...(room.dmStock?.items||{})},
      coins:normalizeWallet(room.dmStock?.coins),
    },
    players,
  };
};

const checkItem=(char,item)=>{
  const issues=[];
  if(item.minStr&&char.stats.str<item.minStr)issues.push(`Requiere FUE ${item.minStr}`);
  if(item.minInt&&char.stats.int<item.minInt)issues.push(`Requiere INT ${item.minInt}`);
  if(item.minLevel&&char.level<item.minLevel)issues.push(`Requiere nivel ${item.minLevel}`);
  if(item.classOnly&&!item.classOnly.includes(char.class))issues.push(`Solo para: ${item.classOnly.map(c=>CLASSES[c]?.n).join(", ")}`);
  return{ok:issues.length===0,issues};
};

const calcAC=(char)=>{
  const eq=char.equipment||{},dexMod=mod(char.stats.dex);
  let ac=10+dexMod;
  const body=ITEMS[eq.body];
  if(body)ac=body.ac+(body.acDex?Math.min(dexMod,body.maxDex!==undefined?body.maxDex:99):0);
  const off=ITEMS[eq.offhand];if(off?.t==="armor")ac+=off.ac||0;
  const cape=ITEMS[eq.cape];if(cape?.ac)ac+=cape.ac;
  const acc=ITEMS[eq.acc];if(acc?.ac)ac+=acc.ac;
  const head=ITEMS[eq.head];if(head?.ac)ac+=head.ac;
  if(char.class==="barbarian"&&!body)ac=10+dexMod+mod(char.stats.con);
  if(char.class==="monk"&&!body&&!eq.offhand)ac=10+dexMod+mod(char.stats.wis);
  return ac;
};

const calcBonuses=(char)=>{
  const eq=char.equipment||{},bonuses={};
  Object.values(eq).forEach(eid=>{const it=ITEMS[eid];if(it?.bonus)Object.entries(it.bonus).forEach(([k,v])=>{bonuses[k]=(bonuses[k]||0)+v;});});
  return bonuses;

// â”€â”€â”€ LINEAGE 2 CHARACTER SVG â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const CharSVG = ({ char }) => {
  if (!char) return null;
  const eq = char.equipment || {};
  const race = char.race || "human";
  const cls = char.class || "fighter";

  // Body color by race
  const skinColors = {human:"#E8C9A0",elf:"#D4E8C0",dwarf:"#C8A878",halfling:"#F0D4A8",gnome:"#D8C4F0",halforc:"#98B878",tiefling:"#C890C0",dragonborn:"#A8C8D8"};
  const skin = skinColors[race] || "#E8C9A0";

  // Armor color by equipped body
  const bodyId = eq.body;
  const bodyItem = ITEMS[bodyId];
  const armorColor = bodyItem ? (bodyId==="elfleafmail"?"#4D7355":bodyId==="elfcourtiertunic"?"#2F6B46":bodyId==="chainmail"||bodyId==="scalemail"?"#9AA8B0":bodyId==="platemail"?"#C8D0D8":bodyId==="leather"?"#8B6040":bodyId==="robes"?"#5050A0":"#888") : "none";
  const hasArmor = !!bodyItem;
  const hasShield = !!eq.offhand;
  const hasWeapon = !!eq.mainhand;
  const hasCape = !!eq.cape;
  const hasHelm = !!eq.head;
  const capeColor = hasCape ? (eq.cape==="elvishcloak"?"#4A7A50":eq.cape==="cloakprotection"?"#8060A0":"#6A4020") : null;
  const weaponItem = ITEMS[eq.mainhand];
  const weaponColor = weaponItem ? (weaponItem.rar==="r"?"#C9A84C":weaponItem.rar==="u"?"#5BA3E0":"#9AA0A8") : "#9AA0A8";
  const isLeafmail = bodyId==="elfleafmail";
  const isCourtierTunic = bodyId==="elfcourtiertunic";
  const isElfShield = eq.offhand==="elfroundshield";
  const isRuneSunblade = eq.mainhand==="runesunblade";
  const useElfSprite = race==="elf";

  const isFemale = char.appearance?.bodyType === "female";
  const hairY = isFemale ? 18 : 20;

  return (
    <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg" className="l2-portrait-svg">
      {/* Glow bg */}
      <radialGradient id="pglow" cx="50%" cy="80%" r="50%">
        <stop offset="0%" stopColor="#C9A84C" stopOpacity="0.15"/>
        <stop offset="100%" stopColor="#C9A84C" stopOpacity="0"/>
      </radialGradient>
      <ellipse cx="50" cy="130" rx="38" ry="14" fill="url(#pglow)"/>
      {useElfSprite && <image href={ELF_BASE_SPRITE} x="16" y="4" width="68" height="150" preserveAspectRatio="xMidYMid meet"/>}

      {/* Cape (back layer) */}
      {hasCape && <path d={`M${isFemale?36:38},50 Q${isFemale?18:20},95 ${isFemale?22:24},145 L${isFemale?32:34},145 Q${isFemale?28:30},95 ${isFemale?42:44},55Z`} fill={capeColor} opacity="0.9"/>}
      {hasCape && <path d={`M${isFemale?64:62},50 Q${isFemale?82:80},95 ${isFemale?78:76},145 L${isFemale?68:66},145 Q${isFemale?72:70},95 ${isFemale?58:56},55Z`} fill={capeColor} opacity="0.9"/>}

      {/* Legs */}
      {!useElfSprite && <>
        <rect x={isFemale?37:38} y="105" width={isFemale?9:9} height="40" rx="3" fill={hasArmor?"#5A6068":skin}/>
        <rect x={isFemale?54:53} y="105" width={isFemale?9:9} height="40" rx="3" fill={hasArmor?"#5A6068":skin}/>
        {/* Boots */}
        <rect x={isFemale?36:37} y="138" width={isFemale?11:11} height="8" rx="3" fill="#3A2A18"/>
        <rect x={isFemale?53:52} y="138" width={isFemale?11:11} height="8" rx="3" fill="#3A2A18"/>
      </>}

      {/* Body */}
      {!useElfSprite && (hasArmor
        ? <rect x={isFemale?32:34} y="60" width={isFemale?36:32} height="48" rx="6" fill={armorColor}/>
        : <rect x={isFemale?32:34} y="60" width={isFemale?36:32} height="48" rx="6" fill={skin}/>
      )}
      {!useElfSprite && hasArmor && <rect x={isFemale?32:34} y="60" width={isFemale?36:32} height="6" rx="3" fill="rgba(255,255,255,0.1)"/>}

      {/* Arms */}
      {!useElfSprite && <>
        <rect x={isFemale?18:20} y="62" width={isFemale?14:13} height="38" rx="5" fill={hasArmor?armorColor:skin}/>
        <rect x={isFemale?68:67} y="62" width={isFemale?14:13} height="38" rx="5" fill={hasArmor?armorColor:skin}/>
      </>}
      {isLeafmail && <>
        <path d="M31,62 Q50,52 69,62 L64,108 Q50,116 36,108Z" fill="#425C56" stroke="#9FB8A0" strokeWidth="1"/>
        <path d="M35,66 Q50,58 65,66 L61,104 Q50,111 39,104Z" fill="#5F8A55"/>
        {[0,1,2,3].map(i=><path key={i} d={`M38,${72+i*7} Q50,${78+i*5} 62,${72+i*7}`} stroke="#B8C0B0" strokeWidth="1" opacity=".75" fill="none"/>)}
        <path d="M40,62 Q50,70 60,62" stroke="#C9A84C" strokeWidth="1.5" fill="none"/>
      </>}
      {isCourtierTunic && <>
        <path d="M32,61 Q50,54 68,61 L66,106 Q50,117 34,106Z" fill="#1F5438" stroke="#8AB06C" strokeWidth="1"/>
        <path d="M42,62 L50,109 L58,62" fill="#C7D59A" opacity=".55"/>
        <path d="M36,75 Q50,82 64,75" stroke="#D2B870" strokeWidth="2" fill="none"/>
        <path d="M34,104 Q50,112 66,104" stroke="#D2B870" strokeWidth="1.2" fill="none"/>
      </>}
      {/* Hands */}
      {!useElfSprite && <>
        <ellipse cx={isFemale?25:26} cy="103" rx="6" ry="5" fill={skin}/>
        <ellipse cx={isFemale?75:74} cy="103" rx="6" ry="5" fill={skin}/>
      </>}

      {/* Shield */}
      {hasShield && isElfShield && <>
        <circle cx="16" cy="90" r="15" fill="#263B42" stroke="#C9A84C" strokeWidth="2"/>
        <circle cx="16" cy="90" r="9" fill="#4E6E73" stroke="#9CC4C4" strokeWidth="1"/>
        <circle cx="16" cy="90" r="3" fill="#5BA3E0"/>
        <path d="M16,75 L19,88 L31,90 L19,93 L16,105 L13,93 L1,90 L13,88Z" fill="none" stroke="#C9A84C" strokeWidth="1" opacity=".8"/>
      </>}
      {hasShield && !isElfShield && <ellipse cx={isFemale?15:15} cy="90" rx="10" ry="14" fill="#6A7880" stroke="#8A9098" strokeWidth="1.5"/>}
      {hasShield && !isElfShield && <line x1={isFemale?15:15} y1="78" x2={isFemale?15:15} y2="102" stroke="#C9A84C" strokeWidth="1.2"/>}
      {hasShield && !isElfShield && <line x1="8" y1="90" x2="22" y2="90" stroke="#C9A84C" strokeWidth="1.2"/>}

      {/* Weapon */}
      {hasWeapon && isRuneSunblade
        ? <>
            <path d="M79,106 L91,38" stroke="#8E6B2A" strokeWidth="4" strokeLinecap="round"/>
            <path d="M82,43 L92,36 L95,48 L88,95 L77,106 Z" fill="#E9D08A" stroke="#C9A84C" strokeWidth="1.5"/>
            <path d="M86,47 L91,45 L86,91 L81,99 Z" fill="#7EC8D8" opacity=".85"/>
            <path d="M75,104 L88,111" stroke="#C9A84C" strokeWidth="4" strokeLinecap="round"/>
            <circle cx="83" cy="103" r="3" fill="#5BA3E0"/>
            <circle cx="88" cy="60" r="8" fill="rgba(201,168,76,.18)" style={{animation:"glow 2s infinite"}}/>
          </>
        : hasWeapon && weaponItem?.ranged
          ? <path d="M82,50 L86,130" stroke={weaponColor} strokeWidth="2" strokeLinecap="round"/>
          : hasWeapon && <path d={`M78,45 L82,115`} stroke={weaponColor} strokeWidth="2.5" strokeLinecap="round"/>
      }
      {hasWeapon && !isRuneSunblade && weaponItem?.t==="weapon" && !weaponItem?.ranged && <path d={`M75,43 L85,43`} stroke={weaponColor} strokeWidth="2.5" strokeLinecap="round"/>}
      {weaponItem?.magical && hasWeapon && !isRuneSunblade && <circle cx="79" cy="50" r="4" fill="rgba(201,168,76,0.4)" style={{animation:"glow 2s infinite"}}/>}

      {/* Neck */}
      {!useElfSprite && <rect x="44" y="50" width="12" height="13" rx="4" fill={skin}/>}

      {/* Head */}
      {!useElfSprite && <ellipse cx="50" cy={isFemale?36:38} rx={isFemale?16:15} ry={isFemale?18:17} fill={skin}/>}

      {/* Helm */}
      {hasHelm && eq.head==="helm" && <path d="M34,38 Q34,20 50,20 Q66,20 66,38 L62,38 Q62,24 50,24 Q38,24 38,38Z" fill="#7A8890"/>}
      {hasHelm && eq.head==="elfleafhelm" && <>
        <path d="M34,39 Q35,21 50,17 Q65,21 66,39 L60,35 Q56,27 50,25 Q44,27 40,35Z" fill="#365F42" stroke="#9CB67C" strokeWidth="1"/>
        <path d="M50,16 Q46,29 35,36 Q48,34 50,45 Q52,34 65,36 Q54,29 50,16Z" fill="#6EA063" opacity=".95"/>
        <path d="M39,28 Q47,24 50,17 Q53,24 61,28" stroke="#C9A84C" strokeWidth="1.2" fill="none"/>
      </>}
      {hasHelm && eq.head==="wizardhat" && <>
        <path d="M50,5 L58,30 L42,30Z" fill="#3A2A70"/>
        <rect x="36" y="28" width="28" height="5" rx="2" fill="#5A4A90"/>
      </>}
      {hasHelm && eq.head==="crownvalor" && <>
        <path d="M34,30 L36,20 L40,28 L50,18 L60,28 L64,20 L66,30Z" fill="#C9A84C"/>
      </>}
      {hasHelm && eq.head==="adventurerhood" && <path d="M34,38 Q34,20 50,20 Q66,20 66,30 L62,32 Q60,22 50,22 Q38,22 38,35Z" fill="#4A3020" opacity="0.85"/>}
      {hasHelm && eq.head==="hairribbon" && <path d="M40,28 Q50,22 60,28 Q55,24 50,26 Q45,24 40,28Z" fill="#C83040"/>}

      {/* Hair */}
      {!useElfSprite && !hasHelm && isFemale && <path d="M34,36 Q34,14 50,14 Q66,14 66,36 Q60,20 50,20 Q40,20 34,36Z" fill="#4A3020"/>}
      {!useElfSprite && !hasHelm && isFemale && <path d="M34,36 Q28,50 30,65" stroke="#4A3020" strokeWidth="6" strokeLinecap="round" fill="none"/>}
      {!useElfSprite && !hasHelm && isFemale && <path d="M66,36 Q72,50 70,65" stroke="#4A3020" strokeWidth="6" strokeLinecap="round" fill="none"/>}
      {!useElfSprite && !hasHelm && !isFemale && <path d="M35,38 Q35,18 50,18 Q65,18 65,38 Q60,22 50,22 Q40,22 35,38Z" fill="#3A2818"/>}

      {/* Face */}
      {!useElfSprite && <>
        <ellipse cx="44" cy={isFemale?37:39} rx="2.5" ry="2" fill="rgba(0,0,0,0.45)"/>
        <ellipse cx="56" cy={isFemale?37:39} rx="2.5" ry="2" fill="rgba(0,0,0,0.45)"/>
        <path d={`M45,${isFemale?44:46} Q50,${isFemale?47:49} 55,${isFemale?44:46}`} stroke="rgba(0,0,0,0.3)" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
      </>}

      {/* Magical glow on armor */}
      {bodyItem?.magical && <rect x={isFemale?32:34} y="60" width={isFemale?36:32} height="48" rx="6" fill="rgba(90,90,200,0.08)" stroke="rgba(100,100,220,0.3)" strokeWidth="0.5"/>}

      {/* Shadow */}
      <ellipse cx="50" cy="148" rx="22" ry="5" fill="rgba(0,0,0,0.4)"/>
    </svg>
  );

const SLOT_LAYOUT = [
  { id:"head",    label:"Cabeza",    icon:"â›‘ï¸",  pos:{top:0, left:"50%", transform:"translateX(-50%)"} },
  { id:"mainhand",label:"Arma",      icon:"âš”ï¸",  pos:{top:60, left:4} },
  { id:"body",    label:"Cuerpo",    icon:"ðŸ›¡ï¸",  pos:{top:60, left:"50%", transform:"translateX(-50%)"} },
  { id:"offhand", label:"Escudo",    icon:"ðŸ›¡",   pos:{top:60, right:4} },
  { id:"cape",    label:"Capa",      icon:"ðŸ§¥",  pos:{top:130, left:4} },
  { id:"acc",     label:"Accesorio", icon:"ðŸ’",  pos:{top:130, left:"50%", transform:"translateX(-50%)"} },
];

const rarBadgeColor = {c:"#888",u:"#5cb85c",r:"#5ba3e0"};

const EquipSlot = ({ slotId, char, onEquip }) => {
  const eq = char?.equipment || {};
  const itemId = eq[slotId];
  const item = ITEMS[itemId];
  const slotDef = SLOT_LAYOUT.find(s=>s.id===slotId);

  return (
    <div
      className={`l2-slot${item?" filled":""}`}
      style={slotDef?.pos ? {...slotDef.pos, position:"absolute"} : {}}
      onClick={() => item && onEquip(null, slotId)}
      title={item ? `${item.n} â€” click para desequipar` : slotDef?.label}
    >
      {item ? <>
        <span className="slot-icon">{item.e}</span>
        <span className="slot-name" style={{maxWidth:36,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.n.split(" ")[0]}</span>
        <span className="slot-rarity" style={{color:rarBadgeColor[item.rar]||"#888"}}>â—</span>
      </> : <>
        <span style={{fontSize:14,opacity:.4}}>{slotDef?.icon}</span>
        <span className="slot-label">{slotDef?.label}</span>
      </>}
    </div>
  );
};

// â”€â”€â”€ DICE PANEL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const DicePanel = ({ char, updateRoom, playerId, canRoll, isDM, diceEnabled }) => {
  const [sel,setSel]=useState(20);
  const [cnt,setCnt]=useState(1);
  const [rolling,setRolling]=useState(false);
  const [result,setResult]=useState(null);
  const [hist,setHist]=useState([]);
  const [advMode,setAdvMode]=useState("normal");
  const [key,setKey]=useState(0);

  const roll=async(sides=sel,count=cnt,label="",adv=advMode)=>{
    if(!canRoll||rolling)return;
    setRolling(true);
    setTimeout(async()=>{
      let rolls,total,special=null;
      if(adv==="adv"||adv==="dis"){
        const r1=Math.floor(Math.random()*20)+1,r2=Math.floor(Math.random()*20)+1;
        rolls=[r1,r2];total=adv==="adv"?Math.max(r1,r2):Math.min(r1,r2);
        special=adv==="adv"?`Ventaja: [${r1},${r2}] â†’`:`Desventaja: [${r1},${r2}] â†’`;
      } else {
        rolls=Array.from({length:count},()=>Math.floor(Math.random()*sides)+1);
        total=rolls.reduce((a,b)=>a+b,0);
      }
      const r={sides,count,rolls,total,label,special,ts:Date.now()};
      setResult(r);setKey(k=>k+1);setHist(h=>[r,...h].slice(0,12));setRolling(false);
      if(char&&updateRoom){
        const txt=special?`ðŸŽ² ${special} **${total}**${label?` (${label})`:""}`:`ðŸŽ² TirÃ³ ${count}d${sides}${label?` (${label})`:""}: [${rolls.join(",")}] = **${total}**`;
        await updateRoom(d=>({...d,messages:[...(d.messages||[]),{id:Date.now(),t:"roll",text:txt,senderName:char.name,ts:Date.now()}]}));
      }
    },650);
  };

  const getColor=(total,sides)=>{const p=total/sides;return p>0.8?"#C9A84C":p>0.5?"#5BA3E0":p<0.25?"#E24B4A":"#F0E6D3";};
  const quickRolls=char?[

  const [rolling,setRolling]=useState(false);
  const [rollsLeft, setRollsLeft] = useState(3);
  const [showTutorial, setShowTutorial] = useState(() => !localStorage.getItem("tutorial_char_done"));

  const rollAllStats=()=>{
  if(rollsLeft<=0)return;
  setRolling(true);
  setTimeout(()=>{
    const rolled=Array.from({length:6},()=>{
      const dice=Array.from({length:4},()=>Math.floor(Math.random()*6)+1);
      dice.sort((a,b)=>a-b);
      return dice.slice(1).reduce((a,b)=>a+b,0);
    }).sort((a,b)=>b-a);
    setRolledPool(rolled);
    setRolling(false);
    setRollsLeft(r=>r-1);
  },800);
};

const assignStat=(stat,idx)=>{
  if(used.includes(idx)&&assigns[stat]!==idx)return;
  const activePool=statMethod==="roll"?rolledPool:pool;
  const na={...assigns},nu=used.filter(u=>u!==assigns[stat]);
  na[stat]=idx;nu.push(idx);setAssigns(na);setUsed(nu);
  const ns={...stats};Object.entries(na).forEach(([s,i])=>{ns[s]=activePool[i];});setStats(ns);
};

    if(!name.trim()||!race||!cls)return;
    const raceBonus=RACES[race].bonus,finalStats={...stats};

    char.ac=calcAC(char);

            borderRight:i<steps.length-1?"1px solid var(--border)":"none",cursor:i<step?"pointer":"default"}}
            onClick={()=>i<step&&setStep(i)}>{i<step?"âœ“ ":""}{s}</div>
        ))}
      </div>
      <div style={{width:"100%",maxWidth:760}}>
        {/* STEP 0 */}
        {step===0&&<div>
          <h2 style={{fontFamily:"Cinzel,serif",color:"var(--gold)",textAlign:"center",marginBottom:20,fontSize:22}}>Nombre y Raza</h2>
          <input className="inp" placeholder="Nombre del personaje..." value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:16,fontSize:17,textAlign:"center"}}/>
          <div style={{display:"flex",gap:8,marginBottom:16,justifyContent:"center"}}>
            {[{id:"male",label:"âš” VarÃ³n"},{id:"female",label:"âœ¨ Mujer"}].map(opt=>(
              <button key={opt.id} className={`btn${bodyType===opt.id?" btn-g":""}`} onClick={()=>setBodyType(opt.id)}>{opt.label}</button>

          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:8}}>
            {Object.entries(RACES).map(([id,r])=>(

                <div style={{fontSize:10,color:"#5cb85c"}}>{Object.entries(r.bonus).map(([s,v])=>`${STAT_N[s]} +${v}`).join(" Â· ")}</div>
              </div>

    </div>
  );
};

  const levelUpPlayer=async(targetPlayerId,hpGainInput=null)=>{
    console.log("LEVEL UP", targetPlayerId);
    let parsedHpGain=parseInt(hpGainInput,10);

  const joinRoom=async(name,code)=>{
    const safeName=name.trim();

    try{
      const data=normalizeRoom(await fb.get(`rooms/${c}`));

  const completeCharacter=async(char)=>{
    setCharacter(char);
    await updateRoom(d=>({
      ...d,
      players:{...(d.players||{}),[playerId]:{...(d.players?.[playerId]||{}),character:char}},
      messages:[...(d.messages||[]),{id:Date.now(),t:"sys",text:`ðŸŽ­ ${playerName} entrÃ³ como ${RACES[char.race]?.n} ${CLASSES[char.class]?.n}: ${char.name}.`,ts:Date.now()}]
    }));

    if(roomData?.dmMode==="ai"||roomData?.dmMode==="hybrid"){

    }
  };

  const saveSession=async()=>{
    try{
      await syncSessionIndex(roomData);
      notify("ðŸ’¾ SesiÃ³n guardada en Firebase");
    }catch(e){notify("Error guardando sesiÃ³n");}
  };

  return(
  <>
    {notif&&<div className="notif">{notif}</div>}

    {screen==="lobby"&&<Lobby
      onCreateRoom={createRoom}
      onJoinRoom={joinRoom}
      sessions={sessions}
      lastRoom={lastRoom}
      initialName={playerName||authUser?.displayName||""}
      authReady={controlReady}
      authUser={authUser}
      account={account}
      ownerExists={ownerExists}
      canCreateRoom={canCreateRoom}
      onAuthLogin={handleAuthLogin}
      onAuthRegister={handleAuthRegister}
      onAuthLogout={handleAuthLogout}
      onClaimOwner={handleClaimOwner}
      onRequestDM={handleRequestDm}
      showOwnerPanel={isOwner}
      ownerAccount={account}
      pendingDMs={pendingDMs}
      approvedDMs={approvedDMs}
      onApproveDm={handleApproveDm}
      onRevokeDm={handleRevokeDm}
      onPlayerLogin={handlePlayerLogin}
      onPlayerRegister={handlePlayerRegister}                   
    />}

    {screen==="character"&&(
      <CharacterCreation 
        onComplete={completeCharacter} 
        playerName={playerName}
      />
    )}

    {screen==="game"&&roomData&&(
      <>
        <GameRoom 
          roomData={roomData} 
          character={character} 
          playerId={playerId} 
          authUid={(authUser && authUser.uid)||null} 
          updateRoom={updateRoom} 
          playerName={playerName} 
          onSave={saveSession} 
          aiLoading={aiLoading} 
          callAI={callAI} 
          notify={notify}
          levelUpPlayer={levelUpPlayer}
        />

        {/* ðŸ”¥ SOLICITUDES DM */}
        {pendingDMs.length > 0 && (
          <div style={{marginTop:20, padding:10, border:"1px solid gray"}}>
            <h3>Solicitudes DM</h3>

              </div>

        )}
      </>
    )}
  </>
);
}
